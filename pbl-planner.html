<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PBL Planner - P2MT</title>
  <link rel="stylesheet" href="https://www.w3schools.com/w3css/4/w3.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link rel="stylesheet" href="https://cdn.datatables.net/1.13.6/css/jquery.dataTables.min.css">
  <link rel="stylesheet" href="./css/main.css">
  <style>
    /* ── Drag-and-drop Team Builder ── */
    .student-chip {
      display: inline-flex; align-items: center; gap: 5px;
      padding: 5px 10px; background: #3b82f6; color: white;
      border-radius: 20px; font-size: 12px; font-weight: 600;
      cursor: grab; user-select: none; white-space: nowrap;
      transition: transform .1s, opacity .1s, box-shadow .1s;
      box-shadow: 0 1px 3px rgba(59,130,246,.35);
    }
    .student-chip:hover { background: #2563eb; box-shadow: 0 3px 8px rgba(59,130,246,.4); }
    .student-chip:active { cursor: grabbing; }
    .student-chip.dragging { opacity: .35; transform: scale(.93); }
    .chip-remove {
      cursor: pointer; opacity: .7; font-size: 13px; line-height: 1;
      padding: 0 1px; font-weight: 900;
    }
    .chip-remove:hover { opacity: 1; }

    .team-card {
      background: white; border-radius: 12px;
      border: 1.5px solid #e2e8f0; padding: 13px;
      display: flex; flex-direction: column; gap: 10px;
    }
    .team-drop-zone {
      min-height: 52px; border: 1.5px dashed #e2e8f0;
      border-radius: 8px; padding: 8px;
      display: flex; flex-wrap: wrap; gap: 6px; align-items: center;
      transition: border-color .15s, background .15s;
    }
    .team-drop-zone.drag-over { border-color: #6366f1; background: #eef2ff; }
    .team-drop-zone .drop-hint { color: #cbd5e1; font-size: 12px; }
  </style>
</head>
<body>
  <div id="nav-container"></div>
  <div class="page-container" style="margin-top:10px;">
    <div class="filter-bar">
      <h2>PBL Planner</h2>
    </div>

    <div class="w3-bar w3-padding w3-margin-bottom">
      <button class="w3-bar-item w3-button w3-teal" id="tab-projects">Projects</button>
      <button class="w3-bar-item w3-button" id="tab-events">Events</button>
      <button class="w3-bar-item w3-button" id="tab-teams">Teams</button>
    </div>

    <!-- Tab 1: PBL Projects -->
    <div id="tab-content-projects" class="tab-content w3-card w3-padding">
      <div class="w3-margin-bottom">
        <button class="w3-button btn-primary w3-margin" id="btn-add-pbl">
          <i class="fas fa-plus"></i> Add PBL
        </button>
        <button class="w3-button btn-primary w3-margin" id="btn-download-pbls">
          <i class="fas fa-download"></i> Download CSV
        </button>
      </div>
      <div class="table-wrap">
      <table id="pbls-table" class="w3-table w3-striped w3-bordered">
          <thead>
            <tr class="w3-teal">
              <th>Class</th>
              <th>School Year</th>
              <th>Quarter</th>
              <th>PBL Name</th>
              <th>Sponsor</th>
              <th>Contact</th>
              <th>Actions</th>
            </tr>
          </thead>
          <tbody id="pbls-tbody">
          </tbody>
        </table>
      </div>
    </div>

    <!-- Tab 2: PBL Events -->
    <div id="tab-content-events" class="tab-content w3-card w3-padding" style="display:none;">
      <div class="w3-row w3-margin-bottom">
        <div class="w3-col m4 w3-padding-small">
          <label>Filter by PBL Project</label>
          <select id="filter-pbl-events" class="w3-select w3-border">
            <option value="">All Projects</option>
          </select>
        </div>
        <div class="w3-col m2 w3-padding-small">
          <label>&nbsp;</label>
          <button class="w3-button btn-primary w3-block" id="btn-filter-events">Filter</button>
        </div>
      </div>
      <div class="w3-margin-bottom">
        <button class="w3-button btn-primary w3-margin" id="btn-add-event">
          <i class="fas fa-plus"></i> Add Event
        </button>
      </div>
      <div class="table-wrap">
      <table id="events-table" class="w3-table w3-striped w3-bordered">
          <thead>
            <tr class="w3-teal">
              <th>PBL Project</th>
              <th>Category</th>
              <th>Date</th>
              <th>Time</th>
              <th>Location</th>
              <th>City/State</th>
              <th>Students</th>
              <th>Actions</th>
            </tr>
          </thead>
          <tbody id="events-tbody">
          </tbody>
        </table>
      </div>
    </div>

    <!-- Tab 3: PBL Teams – Drag & Drop Builder -->
    <div id="tab-content-teams" class="tab-content" style="display:none;">

      <!-- Top controls bar -->
      <div style="display:flex;align-items:center;gap:14px;flex-wrap:wrap;padding:14px 16px;background:#f8fafc;border-radius:10px;border:1.5px solid #e2e8f0;margin-bottom:18px;">
        <div style="display:flex;align-items:center;gap:8px;">
          <label style="font-size:12px;font-weight:700;color:#64748b;white-space:nowrap;">Class</label>
          <select id="builder-class" onchange="builderOnClassChange()" style="padding:7px 10px;border:1.5px solid #e2e8f0;border-radius:8px;font-size:13px;outline:none;background:white;min-width:150px;cursor:pointer;"></select>
        </div>
        <div style="margin-left:auto;display:flex;gap:8px;align-items:center;flex-wrap:wrap;">
          <button onclick="builderAddTeam()" style="padding:8px 14px;border-radius:8px;border:1.5px solid #cbd5e1;background:white;font-size:13px;font-weight:600;cursor:pointer;color:#475569;">
            <i class="fas fa-plus" style="margin-right:5px;"></i>Add Team
          </button>
          <button onclick="downloadTeamsCSV()" style="padding:8px 14px;border-radius:8px;border:1.5px solid #cbd5e1;background:white;font-size:13px;font-weight:600;cursor:pointer;color:#475569;">
            <i class="fas fa-download" style="margin-right:5px;"></i>CSV
          </button>
          <button onclick="emailTeamFromPlanner()" style="padding:8px 14px;border-radius:8px;border:none;background:#0078d4;color:white;font-size:13px;font-weight:600;cursor:pointer;">
            <i class="fas fa-envelope" style="margin-right:5px;"></i>Email
          </button>
          <button id="builder-save-btn" onclick="builderSaveAll()" style="padding:8px 20px;border-radius:8px;border:none;background:#059669;color:white;font-size:13px;font-weight:700;cursor:pointer;">
            <i class="fas fa-save" style="margin-right:6px;"></i>Save Teams
          </button>
        </div>
      </div>

      <!-- Student pool -->
      <div style="margin-bottom:20px;">
        <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:8px;">
          <span style="font-size:13px;font-weight:700;color:#1e293b;">Students &nbsp;<span id="pool-count" style="font-size:12px;color:#94a3b8;font-weight:400;"></span></span>
          <input type="text" id="pool-search" oninput="builderRender()" placeholder="Search…" style="padding:6px 12px;border:1.5px solid #e2e8f0;border-radius:8px;font-size:13px;outline:none;width:190px;">
        </div>
        <div id="student-pool"
          ondragover="event.preventDefault();event.dataTransfer.dropEffect='move';this.style.borderColor='#6366f1';this.style.background='#eef2ff';"
          ondragleave="this.style.borderColor='#e2e8f0';this.style.background='#f8fafc';"
          ondrop="builderDropToPool(event)"
          style="min-height:60px;background:#f8fafc;border:2px dashed #e2e8f0;border-radius:10px;padding:10px 12px;display:flex;flex-wrap:wrap;gap:7px;align-items:center;transition:border-color .15s,background .15s;">
        </div>
      </div>

      <!-- Teams grid -->
      <div id="teams-grid" style="display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:14px;"></div>

    </div>
  </div>

  <!-- Add/Edit PBL Modal -->
  <div id="modal-pbl" class="w3-modal">
    <div class="w3-modal-content w3-card w3-padding">
      <span class="w3-closebtn" onclick="document.getElementById('modal-pbl').style.display='none'">&times;</span>
      <h3 id="modal-pbl-title">Add PBL</h3>
      <div>
        <label>Class Name</label>
        <input type="text" id="pbl-className" class="w3-input w3-border w3-margin-bottom">
        <label>School Year</label>
        <input type="text" id="pbl-schoolYear" class="w3-input w3-border w3-margin-bottom" placeholder="2024-2025">
        <label>Quarter (1-4)</label>
        <input type="number" id="pbl-quarter" class="w3-input w3-border w3-margin-bottom" min="1" max="4">
        <label>PBL Name</label>
        <input type="text" id="pbl-name" class="w3-input w3-border w3-margin-bottom">
        <label>Sponsor</label>
        <input type="text" id="pbl-sponsor" class="w3-input w3-border w3-margin-bottom">
        <label>Sponsor Contact Name</label>
        <input type="text" id="pbl-sponsorName" class="w3-input w3-border w3-margin-bottom">
        <label>Phone</label>
        <input type="tel" id="pbl-sponsorPhone" class="w3-input w3-border w3-margin-bottom">
        <label>Email</label>
        <input type="email" id="pbl-sponsorEmail" class="w3-input w3-border w3-margin-bottom">
        <label>Comments</label>
        <textarea id="pbl-comments" class="w3-input w3-border w3-margin-bottom" rows="3"></textarea>
        <button class="w3-button btn-primary w3-margin-top" id="btn-save-pbl">Save</button>
        <button class="w3-button btn-danger w3-margin-top" onclick="document.getElementById('modal-pbl').style.display='none'">Cancel</button>
      </div>
    </div>
  </div>

  <!-- Add/Edit Event Modal -->
  <div id="modal-event" class="w3-modal">
    <div class="w3-modal-content w3-card w3-padding">
      <span class="w3-closebtn" onclick="document.getElementById('modal-event').style.display='none'">&times;</span>
      <h3>Add/Edit Event</h3>
      <div>
        <label>PBL Project</label>
        <select id="event-pblId" class="w3-select w3-border w3-margin-bottom">
          <option value="">Select PBL...</option>
        </select>
        <label>Category</label>
        <select id="event-category" class="w3-select w3-border w3-margin-bottom">
          <option value="Kickoff">Kickoff</option>
          <option value="Final Presentation">Final Presentation</option>
          <option value="Field Trip">Field Trip</option>
          <option value="Other">Other</option>
        </select>
        <label>Date</label>
        <input type="date" id="event-date" class="w3-input w3-border w3-margin-bottom">
        <label>Start Time</label>
        <input type="time" id="event-startTime" class="w3-input w3-border w3-margin-bottom">
        <label>End Time</label>
        <input type="time" id="event-endTime" class="w3-input w3-border w3-margin-bottom">
        <label>Location</label>
        <input type="text" id="event-location" class="w3-input w3-border w3-margin-bottom">
        <label>Street Address 1</label>
        <input type="text" id="event-address1" class="w3-input w3-border w3-margin-bottom">
        <label>Street Address 2</label>
        <input type="text" id="event-address2" class="w3-input w3-border w3-margin-bottom">
        <label>City</label>
        <input type="text" id="event-city" class="w3-input w3-border w3-margin-bottom">
        <label>State</label>
        <input type="text" id="event-state" class="w3-input w3-border w3-margin-bottom" maxlength="2">
        <label>ZIP</label>
        <input type="text" id="event-zip" class="w3-input w3-border w3-margin-bottom">
        <label>Confirmed</label>
        <input type="checkbox" id="event-confirmed" class="w3-check w3-margin-bottom">
        <label>Comments</label>
        <textarea id="event-comments" class="w3-input w3-border w3-margin-bottom" rows="3"></textarea>
        <button class="w3-button btn-primary w3-margin-top" id="btn-save-event">Save</button>
        <button class="w3-button btn-danger w3-margin-top" onclick="document.getElementById('modal-event').style.display='none'">Cancel</button>
      </div>
    </div>
  </div>

  <!-- Add Student modal removed – use drag-and-drop Teams builder instead -->

  <!-- ══ PBL Email Modal ══════════════════════════════════════════════════════ -->
  <div id="modal-email" style="display:none;position:fixed;inset:0;z-index:3000;background:rgba(0,0,0,.5);backdrop-filter:blur(2px);align-items:center;justify-content:center;padding:16px;">
    <div style="background:#fff;border-radius:14px;width:100%;max-width:780px;max-height:90vh;overflow-y:auto;box-shadow:0 24px 70px rgba(0,0,0,.25);display:flex;flex-direction:column;">

      <!-- Header -->
      <div style="display:flex;align-items:center;justify-content:space-between;padding:20px 24px 16px;border-bottom:1.5px solid #e2e8f0;flex-shrink:0;">
        <div style="display:flex;align-items:center;gap:12px;">
          <div style="width:38px;height:38px;border-radius:50%;background:#dbeafe;display:flex;align-items:center;justify-content:center;">
            <i class="fas fa-envelope" style="color:#3b82f6;font-size:15px;"></i>
          </div>
          <div>
            <div style="font-size:16px;font-weight:700;color:#111;">Email Team</div>
            <div style="font-size:12px;color:#64748b;" id="email-modal-subtitle">Select a project and template</div>
          </div>
        </div>
        <div style="display:flex;align-items:center;gap:10px;">
          <button id="pbl-btn-outlook" onclick="pblConnectOutlook()" style="display:inline-flex;align-items:center;gap:6px;padding:7px 14px;border-radius:7px;font-size:12px;font-weight:600;cursor:pointer;border:1.5px solid #0078d4;color:#0078d4;background:white;">
            <i class="fab fa-microsoft"></i> Connect Outlook
          </button>
          <button onclick="closeEmailModal()" style="background:none;border:none;font-size:22px;cursor:pointer;color:#94a3b8;line-height:1;padding:0 4px;">&times;</button>
        </div>
      </div>

      <!-- Body: two-column -->
      <div style="display:grid;grid-template-columns:260px 1fr;gap:0;flex:1;min-height:0;">

        <!-- Left controls -->
        <div style="padding:20px;border-right:1.5px solid #e2e8f0;display:flex;flex-direction:column;gap:14px;">
          <div>
            <label style="display:block;font-size:11px;font-weight:700;color:#94a3b8;text-transform:uppercase;letter-spacing:.05em;margin-bottom:5px;">Template</label>
            <select id="pbl-email-template" onchange="pblRebuildPreview()" style="width:100%;padding:8px 10px;border:1.5px solid #e2e8f0;border-radius:8px;font-size:13px;outline:none;background:white;">
              <option value="">Select template…</option>
            </select>
          </div>
          <div>
            <label style="display:block;font-size:11px;font-weight:700;color:#94a3b8;text-transform:uppercase;letter-spacing:.05em;margin-bottom:5px;">Project</label>
            <select id="pbl-email-project" onchange="pblOnProjectChange()" style="width:100%;padding:8px 10px;border:1.5px solid #e2e8f0;border-radius:8px;font-size:13px;outline:none;background:white;">
              <option value="">Select project…</option>
            </select>
          </div>
          <div>
            <label style="display:block;font-size:11px;font-weight:700;color:#94a3b8;text-transform:uppercase;letter-spacing:.05em;margin-bottom:5px;">Event (optional)</label>
            <select id="pbl-email-event" onchange="pblRebuildPreview()" style="width:100%;padding:8px 10px;border:1.5px solid #e2e8f0;border-radius:8px;font-size:13px;outline:none;background:white;">
              <option value="">None — skip event variables</option>
            </select>
          </div>
          <div>
            <label style="display:block;font-size:11px;font-weight:700;color:#94a3b8;text-transform:uppercase;letter-spacing:.05em;margin-bottom:5px;">Team (optional)</label>
            <select id="pbl-email-team" onchange="pblRebuildPreview()" style="width:100%;padding:8px 10px;border:1.5px solid #e2e8f0;border-radius:8px;font-size:13px;outline:none;background:white;">
              <option value="">All teams</option>
            </select>
          </div>
          <div id="pbl-rcpt-info" style="font-size:12px;color:#64748b;background:#f8fafc;border-radius:7px;padding:10px;"></div>
        </div>

        <!-- Right: preview -->
        <div style="padding:20px;display:flex;flex-direction:column;gap:12px;">
          <div id="pbl-preview-empty" style="display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:280px;color:#94a3b8;gap:10px;text-align:center;">
            <i class="fas fa-envelope-open-text" style="font-size:40px;opacity:.2;"></i>
            <p style="font-size:14px;margin:0;max-width:260px;" id="pbl-preview-msg">Select a template and project to preview</p>
          </div>
          <div id="pbl-preview-content" style="display:none;flex-direction:column;gap:10px;">
            <div style="display:flex;justify-content:space-between;align-items:center;">
              <span style="font-size:11px;font-weight:700;color:#94a3b8;text-transform:uppercase;">Preview</span>
              <div style="display:flex;align-items:center;gap:8px;">
                <button id="pbl-btn-prev" onclick="pblPreviewStep(-1)" style="width:28px;height:28px;border-radius:50%;border:1.5px solid #e2e8f0;background:white;cursor:pointer;font-size:11px;display:flex;align-items:center;justify-content:center;"><i class="fas fa-chevron-left"></i></button>
                <span style="font-size:12px;color:#64748b;min-width:48px;text-align:center;" id="pbl-prev-count">1 of 1</span>
                <button id="pbl-btn-next" onclick="pblPreviewStep(1)"  style="width:28px;height:28px;border-radius:50%;border:1.5px solid #e2e8f0;background:white;cursor:pointer;font-size:11px;display:flex;align-items:center;justify-content:center;"><i class="fas fa-chevron-right"></i></button>
              </div>
            </div>
            <div style="background:#f8fafc;border-radius:8px;padding:11px 14px;font-size:13px;border:1px solid #e2e8f0;">
              <div style="display:flex;gap:8px;margin-bottom:4px;"><span style="font-weight:700;color:#475569;min-width:56px;">To:</span><span id="pbl-prev-to" style="color:#111;"></span></div>
              <div style="display:flex;gap:8px;"><span style="font-weight:700;color:#475569;min-width:56px;">Subject:</span><span id="pbl-prev-subject" style="color:#111;"></span></div>
            </div>
            <div id="pbl-prev-body" style="border:1.5px solid #e2e8f0;border-radius:8px;padding:14px;font-size:13px;line-height:1.65;color:#111;min-height:160px;max-height:260px;overflow-y:auto;white-space:pre-wrap;background:white;"></div>
          </div>
        </div>
      </div>

      <!-- Footer -->
      <div style="padding:16px 24px;border-top:1.5px solid #e2e8f0;display:flex;align-items:center;justify-content:space-between;flex-shrink:0;gap:12px;">
        <span style="font-size:13px;color:#64748b;" id="pbl-send-label"></span>
        <div style="display:flex;gap:10px;">
          <button onclick="closeEmailModal()" style="padding:9px 18px;border:1.5px solid #e2e8f0;background:white;border-radius:8px;font-weight:600;cursor:pointer;font-size:13px;color:#475569;">Cancel</button>
          <button id="pbl-btn-send" onclick="pblSendAll()" style="display:inline-flex;align-items:center;gap:8px;padding:9px 22px;background:#0078d4;color:white;border:none;border-radius:8px;font-weight:700;font-size:13px;cursor:pointer;">
            <i class="fas fa-paper-plane"></i> <span id="pbl-btn-send-txt">Send</span>
          </button>
        </div>
      </div>
    </div>
  </div>

  <div id="toast-container" style="position:fixed;bottom:20px;right:20px;z-index:9999;"></div>

  <script src="https://code.jquery.com/jquery-3.7.0.min.js"></script>
  <script src="https://cdn.datatables.net/1.13.6/js/jquery.dataTables.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
  <!-- MSAL for Outlook sending -->
  <script src="https://alcdn.msauth.net/browser/2.38.3/js/msal-browser.min.js"></script>
  <script type="module">
    import { initAuth } from './js/auth.js';
    import { initNav } from './js/nav.js';
    import { getAll, getById, addDoc, updateDoc, deleteDoc, getWhere } from './js/db.js';
    import { showToast, exportCSV, confirmTypedDelete } from './js/utils.js';

    let pbls = [];
    let events = [];
    let teams = [];
    let students = [];
    let currentEditingPblId = null;
    let currentEditingEventId = null;

    initAuth().then(user => {
      initNav('pbl-planner');
      init();
    });

    async function init() {
      await loadAllData();
      setupTabListeners();
      setupEventListeners();
      renderPbls();
    }

    async function loadAllData() {
      try {
        pbls = await getAll('pbls') || [];
        events = await getAll('pblEvents') || [];
        teams = await getAll('pblTeams') || [];
        students = await getAll('students') || [];
      } catch (error) {
        console.error('Error loading data:', error);
        showToast('Error loading data', 'error');
      }
    }

    function setupTabListeners() {
      document.getElementById('tab-projects').addEventListener('click', () => {
        switchTab('projects');
      });
      document.getElementById('tab-events').addEventListener('click', () => {
        switchTab('events');
      });
      document.getElementById('tab-teams').addEventListener('click', () => {
        switchTab('teams');
      });
    }

    function switchTab(tab) {
      document.querySelectorAll('.tab-content').forEach(el => el.style.display = 'none');
      document.querySelectorAll('.w3-bar-item').forEach(el => el.classList.remove('w3-teal'));

      if (tab === 'projects') {
        document.getElementById('tab-content-projects').style.display = 'block';
        document.getElementById('tab-projects').classList.add('w3-teal');
        renderPbls();
      } else if (tab === 'events') {
        document.getElementById('tab-content-events').style.display = 'block';
        document.getElementById('tab-events').classList.add('w3-teal');
        populatePblSelectForEvents();
        renderEvents();
      } else if (tab === 'teams') {
        document.getElementById('tab-content-teams').style.display = 'block';
        document.getElementById('tab-teams').classList.add('w3-teal');
        initBuilder();
      }
    }

    function setupEventListeners() {
      document.getElementById('btn-add-pbl').addEventListener('click', openPblModal);
      document.getElementById('btn-save-pbl').addEventListener('click', savePbl);
      document.getElementById('btn-download-pbls').addEventListener('click', downloadPblsCSV);

      document.getElementById('btn-add-event').addEventListener('click', openEventModal);
      document.getElementById('btn-save-event').addEventListener('click', saveEvent);
      document.getElementById('btn-filter-events').addEventListener('click', filterEvents);

    // Convert HH:MM (24h) to h:MM AM/PM
    function fmt12h(t) {
      if (!t) return '';
      const [h, m] = t.split(':').map(Number);
      const ampm = h >= 12 ? 'PM' : 'AM';
      const h12  = h % 12 || 12;
      return `${h12}:${String(m).padStart(2,'0')} ${ampm}`;
    }

    window.syncEventToAttendance = async function(eventId) {
      const event = events.find(e => e.id === eventId);
      if (!event) return;

      const btn  = document.getElementById(`sync-btn-${eventId}`);
      const icon = document.getElementById(`sync-icon-${eventId}`);
      const txt  = document.getElementById(`sync-txt-${eventId}`);

      // ── Loading state ──
      if (btn) {
        btn.disabled = true;
        btn.style.background = '#6d28d9';
        btn.style.transform  = 'scale(.97)';
      }
      if (icon) { icon.className = 'fas fa-spinner fa-spin'; }
      if (txt)  { txt.textContent = 'Syncing…'; }

      let success = false;
      let count   = 0;

      // Patch autoSyncEventComments to tell us what happened
      try {
        const pbl = pbls.find(p => p.id === event.pblId);
        if (pbl && event.eventDate) {
          const startStr   = fmt12h(event.startTime);
          const comment    = [pbl.pblName, event.eventCategory, startStr].filter(Boolean).join(' - ');
          const pblEntries = teams.filter(t => t.pblId === event.pblId);
          const attLogs    = await getAll('classAttendanceLogs');
          const ops = [];

          for (const entry of pblEntries) {
            const student = students.find(s =>
              s.id === entry.studentId ||
              (entry.chattStateANumber && s.chattStateANumber === entry.chattStateANumber)
            );
            if (!student) continue;
            attLogs
              .filter(l =>
                (l.studentId === student.id || l.chattStateANumber === student.chattStateANumber) &&
                (l.date === event.eventDate || l.classDate === event.eventDate)
              )
              .forEach(log => ops.push(updateDoc('classAttendanceLogs', log.id, { comment })));
          }

          count = ops.length;
          if (ops.length) await Promise.all(ops);
        }
        success = true;
      } catch(e) {
        console.error('Sync error', e);
        success = false;
      }

      // ── Result state ──
      if (btn) {
        btn.disabled = false;
        btn.style.transform = 'scale(1)';
        btn.style.background = success ? '#059669' : '#dc2626';
      }
      if (icon) { icon.className = success ? 'fas fa-check' : 'fas fa-times'; }
      if (txt)  { txt.textContent = success ? (count ? `${count} updated` : 'No logs yet') : 'Error'; }

      if (success && count)       showToast(`Updated ${count} attendance comment${count !== 1 ? 's' : ''}`, 'success');
      else if (success && !count) showToast(`No saved logs for ${event.eventDate} — comments will auto-fill when teachers open attendance`, 'info');
      else                        showToast('Error syncing attendance comments', 'error');

      // ── Reset back to normal after 3 s ──
      setTimeout(() => {
        if (btn)  { btn.style.background = '#7c3aed'; }
        if (icon) { icon.className = 'fas fa-sync-alt'; }
        if (txt)  { txt.textContent = 'Sync'; }
      }, 3000);
    };

    // ── Shared sync: write PBL comment to existing attendance logs for the event date ──
    async function autoSyncEventComments(eventData, { silent = true } = {}) {
      try {
        const pbl = pbls.find(p => p.id === eventData.pblId);
        if (!pbl || !eventData.eventDate) return;

        const startStr   = fmt12h(eventData.startTime);
        const comment    = [pbl.pblName, eventData.eventCategory, startStr].filter(Boolean).join(' - ');
        const eventDate  = eventData.eventDate;
        const pblEntries = teams.filter(t => t.pblId === eventData.pblId);
        if (!pblEntries.length) return;

        const attLogs = await getAll('classAttendanceLogs');
        const ops = [];

        for (const entry of pblEntries) {
          const student = students.find(s =>
            s.id === entry.studentId ||
            (entry.chattStateANumber && s.chattStateANumber === entry.chattStateANumber)
          );
          if (!student) continue;

          attLogs
            .filter(l =>
              (l.studentId === student.id || l.chattStateANumber === student.chattStateANumber) &&
              (l.date === eventDate || l.classDate === eventDate)
            )
            .forEach(log => ops.push(updateDoc('classAttendanceLogs', log.id, { comment })));
        }

        if (ops.length) {
          await Promise.all(ops);
          if (!silent)
            showToast(`Updated ${ops.length} attendance comment${ops.length !== 1 ? 's' : ''} for ${pbl.pblName}`, 'success');
        } else if (!silent) {
          showToast(`No saved attendance logs found for ${eventDate} — comments will auto-fill when teachers open attendance`, 'info');
        }
      } catch(e) {
        console.warn('autoSyncEventComments failed:', e);
        if (!silent) showToast('Error syncing attendance comments', 'error');
      }
    }

    // ══════════════════════════════════════════════════════════════
    //  DRAG & DROP TEAM BUILDER
    // ══════════════════════════════════════════════════════════════
    let builderAssignments = new Map(); // studentId  -> teamNumber
    let builderTeamPbls    = new Map(); // teamNumber -> pblId
    let builderTeamCount   = 3;
    let builderDragId      = null;

    function initBuilder() {
      // Populate class filter from unique PBL classNames
      const classes = [...new Set(pbls.map(p => p.className).filter(Boolean))].sort();
      const sel = document.getElementById('builder-class');
      sel.innerHTML = '<option value="">All Classes</option>' +
        classes.map(c => `<option value="${escEmail(c)}">${escEmail(c)}</option>`).join('');

      // Load existing assignments — normalise to studentId
      builderAssignments.clear();
      builderTeamPbls.clear();
      builderTeamCount = 3;

      teams.forEach(t => {
        let sid = t.studentId;
        if (!sid && t.chattStateANumber) {
          const s = students.find(s => s.chattStateANumber === t.chattStateANumber);
          sid = s?.id;
        }
        if (!sid || !t.pblTeamNumber) return;
        builderAssignments.set(sid, t.pblTeamNumber);
        if (!builderTeamPbls.has(t.pblTeamNumber)) builderTeamPbls.set(t.pblTeamNumber, t.pblId || '');
        if (t.pblTeamNumber > builderTeamCount) builderTeamCount = t.pblTeamNumber;
      });

      builderRender();
    }

    window.builderOnClassChange = function() { builderRender(); };

    window.builderAddTeam = function() {
      builderTeamCount++;
      builderRender();
    };

    function builderGetFilteredStudents() {
      const q = (document.getElementById('pool-search')?.value || '').toLowerCase().trim();
      return students.filter(s =>
        !q || `${s.firstName} ${s.lastName}`.toLowerCase().includes(q) ||
        (s.chattStateANumber || '').toLowerCase().includes(q)
      );
    }

    function builderGetVisiblePbls() {
      const cls = document.getElementById('builder-class')?.value || '';
      return cls ? pbls.filter(p => p.className === cls) : pbls;
    }

    window.builderRender = function() {
      const allStudents   = builderGetFilteredStudents();
      const visiblePbls   = builderGetVisiblePbls();
      const unassigned    = allStudents.filter(s => !builderAssignments.has(s.id));

      // ── Pool ──────────────────────────────────────────
      const pool = document.getElementById('student-pool');
      document.getElementById('pool-count').textContent = `(${unassigned.length} unassigned of ${students.length})`;
      pool.innerHTML = unassigned.length
        ? unassigned.map(s => chipHtml(s, null)).join('')
        : '<span style="color:#94a3b8;font-size:13px;">All students are assigned — drag from teams to unassign</span>';

      // ── Teams grid ────────────────────────────────────
      const grid = document.getElementById('teams-grid');
      grid.innerHTML = '';

      for (let n = 1; n <= builderTeamCount; n++) {
        const teamStudents = students.filter(s => builderAssignments.get(s.id) === n);
        const selPblId     = builderTeamPbls.get(n) || '';

        const pblOptions = '<option value="">Choose PBL…</option>' +
          visiblePbls.map(p =>
            `<option value="${p.id}" ${selPblId === p.id ? 'selected' : ''}>${escEmail(p.pblName)} (${escEmail(p.className)})</option>`
          ).join('');

        const card = document.createElement('div');
        card.className = 'team-card';
        card.innerHTML = `
          <div style="display:flex;align-items:center;justify-content:space-between;">
            <span style="font-size:14px;font-weight:700;color:#1e293b;">Team ${n}</span>
            <button onclick="builderRemoveTeam(${n})" title="Remove team"
              style="background:none;border:none;cursor:pointer;color:#cbd5e1;font-size:14px;padding:2px 5px;border-radius:4px;"
              onmouseover="this.style.color='#ef4444';this.style.background='#fee2e2';"
              onmouseout="this.style.color='#cbd5e1';this.style.background='none';">
              <i class="fas fa-times"></i>
            </button>
          </div>
          <select onchange="builderSetTeamPbl(${n}, this.value)"
            style="width:100%;padding:6px 8px;border:1.5px solid #e2e8f0;border-radius:7px;font-size:12px;outline:none;background:white;cursor:pointer;">
            ${pblOptions}
          </select>
          <div class="team-drop-zone" id="team-drop-${n}"
            ondragover="event.preventDefault();event.dataTransfer.dropEffect='move';document.getElementById('team-drop-${n}').classList.add('drag-over');"
            ondragleave="document.getElementById('team-drop-${n}').classList.remove('drag-over');"
            ondrop="builderDropToTeam(event,${n})">
            ${teamStudents.length
              ? teamStudents.map(s => chipHtml(s, n)).join('')
              : '<span class="drop-hint">Drop students here</span>'}
          </div>`;
        grid.appendChild(card);
      }

      // Attach drag listeners to every chip
      document.querySelectorAll('.student-chip').forEach(chip => {
        chip.addEventListener('dragstart', e => {
          builderDragId = chip.dataset.id;
          setTimeout(() => chip.classList.add('dragging'), 0);
          e.dataTransfer.effectAllowed = 'move';
        });
        chip.addEventListener('dragend', () => chip.classList.remove('dragging'));
      });
    };

    function chipHtml(student, teamNumber) {
      const name = escEmail(`${student.firstName} ${student.lastName}`);
      const rmBtn = teamNumber !== null
        ? `<span class="chip-remove" onclick="builderRemoveStudent('${student.id}')" title="Remove">×</span>`
        : '';
      return `<span class="student-chip" draggable="true" data-id="${student.id}">${name}${rmBtn}</span>`;
    }

    window.builderDropToTeam = function(event, n) {
      event.preventDefault();
      document.getElementById(`team-drop-${n}`)?.classList.remove('drag-over');
      if (!builderDragId) return;
      builderAssignments.set(builderDragId, n);
      builderDragId = null;
      builderRender();
    };

    window.builderDropToPool = function(event) {
      event.preventDefault();
      const pool = document.getElementById('student-pool');
      pool.style.borderColor = '#e2e8f0';
      pool.style.background  = '#f8fafc';
      if (!builderDragId) return;
      builderAssignments.delete(builderDragId);
      builderDragId = null;
      builderRender();
    };

    window.builderRemoveStudent = function(sid) {
      builderAssignments.delete(sid);
      builderRender();
    };

    window.builderSetTeamPbl = function(n, pblId) {
      builderTeamPbls.set(n, pblId);
    };

    window.builderRemoveTeam = function(n) {
      // Return students to pool
      builderAssignments.forEach((t, sid) => { if (t === n) builderAssignments.delete(sid); });
      // Shift higher team numbers down
      const newA = new Map(), newP = new Map();
      builderAssignments.forEach((t, sid) => newA.set(sid, t > n ? t - 1 : t));
      builderTeamPbls.forEach((pid, t) => { if (t !== n) newP.set(t > n ? t - 1 : t, pid); });
      builderAssignments = newA;
      builderTeamPbls    = newP;
      builderTeamCount--;
      builderRender();
    };

    window.builderSaveAll = async function() {
      const btn = document.getElementById('builder-save-btn');
      btn.disabled = true;
      btn.innerHTML = '<i class="fas fa-spinner fa-spin" style="margin-right:6px;"></i>Saving…';

      try {
        // Build desired state: studentId -> {teamNum, pblId}
        const desired = new Map();
        builderAssignments.forEach((teamNum, sid) => {
          desired.set(sid, { teamNum, pblId: builderTeamPbls.get(teamNum) || '' });
        });

        // Build existing state from teams array (normalised to studentId)
        const existingBySid = new Map();
        teams.forEach(t => {
          let sid = t.studentId;
          if (!sid && t.chattStateANumber) {
            const s = students.find(s => s.chattStateANumber === t.chattStateANumber);
            sid = s?.id;
          }
          if (sid) existingBySid.set(sid, t);
        });

        const ops = [];

        // Creates & updates
        desired.forEach(({ teamNum, pblId }, sid) => {
          const student  = students.find(s => s.id === sid);
          if (!student) return;
          const pbl      = pbls.find(p => p.id === pblId);
          const existing = existingBySid.get(sid);
          const data = {
            pblId,
            pblTeamNumber:     teamNum,
            studentId:         sid,
            studentName:       `${student.firstName} ${student.lastName}`,
            chattStateANumber: student.chattStateANumber,
            className:         pbl?.className  || '',
            schoolYear:        pbl?.schoolYear || '',
            semester:          pbl?.semester   || '',
            quarter:           pbl?.quarter    || null,
          };
          if (existing) {
            if (existing.pblTeamNumber !== teamNum || existing.pblId !== pblId) {
              ops.push(updateDoc('pblTeams', existing.id, data).then(() => {
                const idx = teams.findIndex(t => t.id === existing.id);
                if (idx >= 0) teams[idx] = { ...teams[idx], ...data };
              }));
            }
          } else {
            ops.push(addDoc('pblTeams', data).then(docId => teams.push({ ...data, id: docId })));
          }
        });

        // Deletes
        existingBySid.forEach((doc, sid) => {
          if (!desired.has(sid)) {
            ops.push(deleteDoc('pblTeams', doc.id).then(() => {
              teams = teams.filter(t => t.id !== doc.id);
            }));
          }
        });

        await Promise.all(ops);
        showToast(`Teams saved (${ops.length} change${ops.length !== 1 ? 's' : ''})`, 'success');
      } catch(e) {
        console.error('Save error', e);
        showToast('Error saving teams', 'error');
      } finally {
        btn.disabled = false;
        btn.innerHTML = '<i class="fas fa-save" style="margin-right:6px;"></i>Save Teams';
      }
    };

    function downloadTeamsCSV() {
      const headers = ['Student Name', 'ChattState A#', 'Team Number', 'Class', 'PBL Name', 'Quarter'];
      const rows = teams.map(team => {
        const pbl = pbls.find(p => p.id === team.pblId);
        return [
          team.studentName,
          team.chattStateANumber,
          team.pblTeamNumber || '',
          team.className,
          pbl?.pblName || '',
          team.quarter
        ];
      });
      exportCSV(headers, rows, 'pbl-teams.csv');
    }

    // ── Email Modal ───────────────────────────────────────────────────────────────
    let pblEmailTemplates  = [];
    let pblPreviewMsgs     = [];
    let pblPreviewIdx      = 0;
    let pblMsalClient      = null;
    let pblMsalAccount     = null;
    const PBL_EMAIL_SCOPES = ['Mail.Send', 'User.Read'];

    // Open the email modal, pre-select PBL from current filter
    window.emailTeamFromPlanner = async function() {
      const modal = document.getElementById('modal-email');
      modal.style.display = 'flex';

      // Load templates if not yet loaded
      if (!pblEmailTemplates.length) {
        try {
          pblEmailTemplates = await getAll('p2mtTemplates');
        } catch(e) { showToast('Could not load templates', 'error'); }
      }

      // Populate template selector
      const tSel = document.getElementById('pbl-email-template');
      tSel.innerHTML = '<option value="">Select template…</option>' +
        pblEmailTemplates.map(t => `<option value="${t.id}">${escEmail(t.name || 'Untitled')}</option>`).join('');

      // Populate project selector, pre-select based on the active class filter
      const pSel = document.getElementById('pbl-email-project');
      const activeClass = (document.getElementById('builder-class')?.value || '').trim();
      pSel.innerHTML = '<option value="">Select project…</option>' +
        pbls.map(p => `<option value="${p.id}">${escEmail(p.pblName)} (${escEmail(p.className)})</option>`).join('');

      // If the builder is filtered to a single class, try to pre-select the matching PBL
      if (activeClass) {
        const matchingPbls = pbls.filter(p => p.className === activeClass);
        if (matchingPbls.length === 1) {
          pSel.value = matchingPbls[0].id;
          pblOnProjectChange();
        }
      }

      // Init MSAL from cache
      pblInitMsalFromCache();
      pblUpdateOutlookBtn();
      pblRebuildPreview();
    };

    window.closeEmailModal = function() {
      document.getElementById('modal-email').style.display = 'none';
    };

    window.pblOnProjectChange = function() {
      const pblId = document.getElementById('pbl-email-project').value;
      const projEvents = pblId ? events.filter(e => e.pblId === pblId) : [];
      const eSel = document.getElementById('pbl-email-event');
      eSel.innerHTML = '<option value="">None — skip event variables</option>' +
        projEvents.map(e => `<option value="${e.id}">${escEmail(e.eventCategory)} — ${pblFmtDate(e.eventDate)}</option>`).join('');

      const projTeams = pblId ? teams.filter(t => t.pblId === pblId) : [];
      const teamNums  = [...new Set(projTeams.map(t => t.pblTeamNumber || t.teamNumber))].filter(Boolean).sort((a,b)=>a-b);
      const tSel = document.getElementById('pbl-email-team');
      tSel.innerHTML = '<option value="">All teams</option>' +
        teamNums.map(n => `<option value="${n}">Team ${n}</option>`).join('');

      pblRebuildPreview();
    };

    window.pblRebuildPreview = function() {
      const tmpl   = pblEmailTemplates.find(t => t.id === document.getElementById('pbl-email-template').value);
      const pblId  = document.getElementById('pbl-email-project').value;
      const pbl    = pbls.find(p => p.id === pblId) || null;
      const event  = events.find(e => e.id === document.getElementById('pbl-email-event').value) || null;
      const teamNum= document.getElementById('pbl-email-team').value;

      if (!tmpl || !pbl) {
        document.getElementById('pbl-preview-empty').style.display  = 'flex';
        document.getElementById('pbl-preview-content').style.display = 'none';
        document.getElementById('pbl-preview-msg').textContent = !tmpl ? 'Select a template to continue' : 'Select a project to continue';
        document.getElementById('pbl-send-label').textContent  = '';
        document.getElementById('pbl-btn-send-txt').textContent = 'Send';
        document.getElementById('pbl-rcpt-info').textContent   = '';
        return;
      }

      let projTeams = teams.filter(t => t.pblId === pblId);
      if (teamNum) projTeams = projTeams.filter(t => String(t.pblTeamNumber || t.teamNumber) === String(teamNum));

      const msgs = projTeams.map(entry => {
        const student = students.find(s =>
          s.id === entry.studentId ||
          (entry.chattStateANumber && s.chattStateANumber === entry.chattStateANumber)
        );
        if (!student) return null;
        const data = pblBuildData(student, entry, pbl, event);
        return {
          to:      student.email || student.chattStateEmail || '',
          name:    `${student.firstName} ${student.lastName}`,
          subject: pblMerge(tmpl.subject || '', data),
          body:    pblMerge(tmpl.body    || '', data),
        };
      }).filter(Boolean);

      pblPreviewMsgs = msgs;
      pblPreviewIdx  = 0;

      const info = `${msgs.length} student${msgs.length !== 1 ? 's' : ''} in ${pbl.pblName}${teamNum ? ` — Team ${teamNum}` : ''}`;
      document.getElementById('pbl-rcpt-info').textContent    = info;
      document.getElementById('email-modal-subtitle').textContent = info;

      if (!msgs.length) {
        document.getElementById('pbl-preview-empty').style.display  = 'flex';
        document.getElementById('pbl-preview-content').style.display = 'none';
        document.getElementById('pbl-preview-msg').textContent = 'No students found for this selection';
        return;
      }

      document.getElementById('pbl-preview-empty').style.display  = 'none';
      document.getElementById('pbl-preview-content').style.display = 'flex';
      document.getElementById('pbl-send-label').textContent  = `${msgs.length} recipient${msgs.length !== 1 ? 's' : ''}`;
      document.getElementById('pbl-btn-send-txt').textContent = `Send ${msgs.length} Email${msgs.length !== 1 ? 's' : ''}`;
      pblRenderSlide();
    };

    function pblRenderSlide() {
      const msg = pblPreviewMsgs[pblPreviewIdx];
      if (!msg) return;
      document.getElementById('pbl-prev-to').textContent      = msg.to ? `${msg.name} <${msg.to}>` : `${msg.name} (no email)`;
      document.getElementById('pbl-prev-subject').textContent = msg.subject;
      document.getElementById('pbl-prev-body').textContent    = msg.body;
      document.getElementById('pbl-prev-count').textContent   = `${pblPreviewIdx + 1} of ${pblPreviewMsgs.length}`;
      document.getElementById('pbl-btn-prev').disabled = pblPreviewIdx === 0;
      document.getElementById('pbl-btn-next').disabled = pblPreviewIdx === pblPreviewMsgs.length - 1;
    }

    window.pblPreviewStep = function(dir) {
      const next = pblPreviewIdx + dir;
      if (next >= 0 && next < pblPreviewMsgs.length) { pblPreviewIdx = next; pblRenderSlide(); }
    };

    function pblBuildData(student, teamEntry, pbl, event) {
      return {
        studentName:    `${student.firstName} ${student.lastName}`,
        firstName:      student.firstName || '',
        lastName:       student.lastName  || '',
        studentEmail:   student.email || student.chattStateEmail || '',
        teamNumber:     String(teamEntry?.pblTeamNumber || teamEntry?.teamNumber || ''),
        pblName:        pbl?.pblName || '',
        pblClass:       pbl?.className || '',
        sponsorName:    pbl?.pblSponsor || '',
        sponsorContact: pbl?.pblSponsorPersonName || '',
        eventName:      event?.eventCategory || '',
        eventDate:      event ? pblFmtDate(event.eventDate) : '',
        eventTime:      event ? fmt12h(event.startTime) : '',
        eventEndTime:   event ? fmt12h(event.endTime) : '',
        eventLocation:  event?.eventLocation || '',
        eventAddress:   event ? [event.eventStreetAddress1, event.eventStreetAddress2].filter(Boolean).join(', ') : '',
        eventCityState: event ? [event.eventCity, event.eventState].filter(Boolean).join(', ') : '',
        eventZip:       event?.eventZip || '',
      };
    }

    function pblMerge(text, data) {
      return Object.entries(data).reduce(
        (t, [k, v]) => t.replace(new RegExp(`\\{\\{${k}\\}\\}`, 'g'), v ?? ''), text
      );
    }

    function pblFmtDate(d) {
      if (!d) return '';
      const m = String(d).match(/^(\d{4})-(\d{2})-(\d{2})/);
      return m ? new Date(+m[1], +m[2]-1, +m[3]).toLocaleDateString('en-US', { month: 'long', day: 'numeric', year: 'numeric' }) : d;
    }
    function escEmail(s) {
      return String(s ?? '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
    }

    // ── MSAL for PBL email ────────────────────────────────────────────────────────
    function pblMakeMsal(clientId) {
      return new msal.PublicClientApplication({
        auth: { clientId, authority: 'https://login.microsoftonline.com/common', redirectUri: window.location.origin + window.location.pathname },
        cache: { cacheLocation: 'sessionStorage', storeAuthStateInCookie: false },
      });
    }
    function pblInitMsalFromCache() {
      const cid = localStorage.getItem('p2mt_azure_client_id');
      if (!cid) return;
      pblMsalClient = pblMakeMsal(cid);
      const accts   = pblMsalClient.getAllAccounts();
      if (accts.length) { pblMsalAccount = accts[0]; }
    }
    window.pblConnectOutlook = async function() {
      let cid = localStorage.getItem('p2mt_azure_client_id');
      if (!cid) {
        cid = prompt('Enter your Azure Application (Client) ID:');
        if (!cid) return;
        localStorage.setItem('p2mt_azure_client_id', cid.trim());
      }
      try {
        pblMsalClient  = pblMakeMsal(cid.trim());
        const resp     = await pblMsalClient.loginPopup({ scopes: PBL_EMAIL_SCOPES });
        pblMsalAccount = resp.account;
        pblUpdateOutlookBtn();
        showToast(`Connected as ${pblMsalAccount.username}`, 'success');
      } catch(e) { showToast('Could not connect to Outlook', 'error'); }
    };
    async function pblGetToken() {
      if (!pblMsalClient || !pblMsalAccount) throw new Error('Not connected');
      try {
        const r = await pblMsalClient.acquireTokenSilent({ scopes: PBL_EMAIL_SCOPES, account: pblMsalAccount });
        return r.accessToken;
      } catch {
        const r = await pblMsalClient.acquireTokenPopup({ scopes: PBL_EMAIL_SCOPES });
        pblMsalAccount = r.account;
        return r.accessToken;
      }
    }
    function pblUpdateOutlookBtn() {
      const btn = document.getElementById('pbl-btn-outlook');
      if (!btn) return;
      if (pblMsalAccount) {
        btn.style.borderColor = '#16a34a';
        btn.style.color       = '#16a34a';
        btn.innerHTML = `<span style="width:8px;height:8px;border-radius:50%;background:#16a34a;display:inline-block;margin-right:4px;"></span>${pblMsalAccount.username}`;
        btn.onclick   = () => {};
      } else {
        btn.style.borderColor = '#0078d4';
        btn.style.color       = '#0078d4';
        btn.innerHTML = '<i class="fab fa-microsoft"></i> Connect Outlook';
        btn.onclick   = pblConnectOutlook;
      }
    }

    window.pblSendAll = async function() {
      if (!pblPreviewMsgs.length) return;
      if (!pblMsalAccount) {
        showToast('Connect your Outlook account first', 'warning');
        pblConnectOutlook();
        return;
      }
      const btn = document.getElementById('pbl-btn-send');
      btn.disabled = true;
      btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Sending…';
      let sent = 0, failed = 0;
      try {
        const token = await pblGetToken();
        for (const msg of pblPreviewMsgs) {
          if (!msg.to) { failed++; continue; }
          const res = await fetch('https://graph.microsoft.com/v1.0/me/sendMail', {
            method: 'POST',
            headers: { 'Authorization': `Bearer ${token}`, 'Content-Type': 'application/json' },
            body: JSON.stringify({
              message: {
                subject: msg.subject,
                body: { contentType: 'Text', content: msg.body },
                toRecipients: [{ emailAddress: { address: msg.to } }],
              },
              saveToSentItems: true,
            }),
          });
          res.ok ? sent++ : failed++;
        }
        showToast(failed === 0 ? `✓ Sent ${sent} email${sent!==1?'s':''}!` : `Sent ${sent}, failed ${failed}`, failed === 0 ? 'success' : 'warning');
        if (failed === 0) closeEmailModal();
      } catch(e) {
        showToast('Could not get Outlook token — please reconnect', 'error');
        pblMsalAccount = null;
        pblUpdateOutlookBtn();
      } finally {
        btn.disabled = false;
        btn.innerHTML = `<i class="fas fa-paper-plane"></i> <span id="pbl-btn-send-txt">Send ${pblPreviewMsgs.length} Email${pblPreviewMsgs.length!==1?'s':''}</span>`;
      }
    };

    window.addEventListener('click', (event) => {
      const modalPbl     = document.getElementById('modal-pbl');
      const modalEvent   = document.getElementById('modal-event');
      const modalEmail   = document.getElementById('modal-email');
      if (event.target === modalPbl)     modalPbl.style.display     = 'none';
      if (event.target === modalEvent)   modalEvent.style.display   = 'none';
      if (event.target === modalEmail)   modalEmail.style.display   = 'none';
    });
  </script>
</body>
</html>
