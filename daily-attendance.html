<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <script src="./js/theme-init.js"></script>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Daily Attendance Log - P2MT</title>
  <link rel="stylesheet" href="https://www.w3schools.com/w3css/4/w3.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link rel="stylesheet" href="https://cdn.datatables.net/1.13.6/css/jquery.dataTables.min.css">
  <link rel="stylesheet" href="./css/main.css">
  <style>
    .code-badge { display:inline-block; padding:3px 10px; border-radius:10px; font-weight:700; font-size:12px; }
    .code-U  { background:#FEE2E2; color:#991B1B; }
    .code-T  { background:#FEF3C7; color:#92400E; }
    .code-E  { background:#DBEAFE; color:#1D4ED8; }
    .excuse-PE { background:#D1FAE5; color:#065F46; padding:2px 8px; border-radius:8px; font-size:11px; font-weight:700; }
    .excuse-DE { background:#EDE9FE; color:#5B21B6; padding:2px 8px; border-radius:8px; font-size:11px; font-weight:700; }
    .grid-stats { display:grid; grid-template-columns:repeat(auto-fit, minmax(180px, 1fr)); gap:16px; margin-bottom:16px; }
    .stat-card { background:white; padding:16px; border-radius:8px; box-shadow:0 2px 4px rgba(0,0,0,.1); display:flex; gap:12px; align-items:center; }
    .stat-icon { width:48px; height:48px; border-radius:50%; display:flex; align-items:center; justify-content:center; font-size:22px; }
    .stat-icon.blue   { background:#E3F2FD; color:#2196F3; }
    .stat-icon.red    { background:#FFEBEE; color:#F44336; }
    .stat-icon.yellow { background:#FEF3C7; color:#F59E0B; }
    .stat-icon.green  { background:#D1FAE5; color:#10B981; }
    .stat-value { font-size:24px; font-weight:700; color:#333; }
    .stat-label { font-size:12px; color:#999; margin-top:4px; }
    .filter-card { background:white; box-shadow:0 2px 4px rgba(0,0,0,.1); }
    .action-button { margin:2px; font-size:.9rem; }
    .code-Lab { background:#f3e8ff; color:#6d28d9; }
    .lab-row   { background:#faf5ff !important; }
    .lab-badge { display:inline-flex; align-items:center; gap:4px; font-size:11px; font-weight:700; color:#7c3aed; background:#ede9fe; padding:2px 7px; border-radius:10px; }
  </style>
</head>
<body>
  <div id="nav-container"></div>

  <div class="page-container">
    <!-- Header -->
    <div class="page-header">
      <h1><i class="fas fa-calendar-check"></i> Daily Attendance Log</h1>
      <div class="actions">
        <button id="btn-download-csv" class="w3-button btn-primary action-button">
          <i class="fas fa-download"></i> Download CSV
        </button>
      </div>
    </div>

    <!-- Stats -->
    <div class="grid-stats" id="stats-row">
      <div class="stat-card">
        <div class="stat-icon blue"><i class="fas fa-list"></i></div>
        <div><div class="stat-value" id="stat-total">0</div><div class="stat-label">Total Records</div></div>
      </div>
      <div class="stat-card">
        <div class="stat-icon red"><i class="fas fa-times-circle"></i></div>
        <div><div class="stat-value" id="stat-unexcused">0</div><div class="stat-label">Unexcused (U)</div></div>
      </div>
      <div class="stat-card">
        <div class="stat-icon yellow"><i class="fas fa-clock"></i></div>
        <div><div class="stat-value" id="stat-tardy">0</div><div class="stat-label">Tardy (T)</div></div>
      </div>
      <div class="stat-card">
        <div class="stat-icon green"><i class="fas fa-file-medical"></i></div>
        <div><div class="stat-value" id="stat-excused">0</div><div class="stat-label">Excused (E / PE / DE)</div></div>
      </div>
      <div class="stat-card" id="stat-lab-card" style="display:none;">
        <div class="stat-icon" style="background:#f3e8ff;color:#7c3aed;"><i class="fas fa-flask"></i></div>
        <div><div class="stat-value" id="stat-lab">0</div><div class="stat-label">Learning Lab Sessions</div></div>
      </div>
    </div>

    <!-- Filters -->
    <div class="filter-bar filter-card w3-margin-bottom">
      <div class="w3-row">
        <div class="w3-col m2 w3-padding-small">
          <label class="form-label">Start Date</label>
          <input type="date" id="filter-start" class="w3-input w3-border">
        </div>
        <div class="w3-col m2 w3-padding-small">
          <label class="form-label">End Date</label>
          <input type="date" id="filter-end" class="w3-input w3-border">
        </div>
        <div class="w3-col m3 w3-padding-small">
          <label class="form-label">Student</label>
          <input type="text" id="filter-student" class="w3-input w3-border" placeholder="Name or A#…">
        </div>
        <div class="w3-col m2 w3-padding-small">
          <label class="form-label">Teacher</label>
          <select id="filter-teacher" class="w3-select w3-border">
            <option value="">All Teachers</option>
          </select>
        </div>
        <div class="w3-col m2 w3-padding-small">
          <label class="form-label">Code</label>
          <select id="filter-code" class="w3-select w3-border">
            <option value="">All (T/U/E)</option>
            <option value="U">Unexcused (U)</option>
            <option value="T">Tardy (T)</option>
            <option value="E">Excused (E)</option>
          </select>
        </div>
        <div class="w3-col m1 w3-padding-small" style="padding-top:28px;">
          <button id="btn-apply" class="w3-button btn-primary w3-block"><i class="fas fa-filter"></i></button>
        </div>
      </div>
      <div class="w3-row w3-margin-top">
        <div class="w3-col m12 w3-padding-small" style="display:flex; align-items:center; gap:20px; flex-wrap:wrap;">
          <button id="btn-clear" class="w3-button btn-ghost"><i class="fas fa-times"></i> Clear</button>
          <label style="display:flex; align-items:center; gap:8px; cursor:pointer; font-size:13px; font-weight:600; color:#6d28d9; user-select:none;">
            <input type="checkbox" id="filter-include-labs" style="width:16px;height:16px;accent-color:#7c3aed;">
            <i class="fas fa-flask" style="font-size:13px;"></i> Include Learning Lab Sessions
          </label>
        </div>
      </div>
    </div>

    <!-- Table -->
    <div class="table-wrap">
      <div id="loading-container" class="loading-container" style="display:none;">
        <div class="loading-text"><div class="spinner"></div><span>Loading attendance records…</span></div>
      </div>
      <table id="attendanceTable" class="w3-table w3-striped w3-bordered" style="width:100%;">
        <thead class="w3-blue">
          <tr>
            <th>Date</th>
            <th>Student</th>
            <th>A#</th>
            <th>Code</th>
            <th>Class</th>
            <th>Teacher</th>
            <th>Excuse</th>
            <th>Comment</th>
            <th>Actions</th>
          </tr>
        </thead>
        <tbody id="attendance-tbody"></tbody>
      </table>
    </div>
  </div>

  <!-- Excuse Modal -->
  <div id="excuseModal" class="w3-modal" onclick="if(event.target===this)closeExcuseModal()">
    <div class="w3-modal-content w3-card" style="max-width:460px;">
      <button class="modal-close-btn" onclick="closeExcuseModal()">×</button>
      <div class="modal-body">
        <h3><i class="fas fa-file-alt"></i> Add / Edit Excuse</h3>
        <input type="hidden" id="excuse-log-id">
        <div id="excuse-student-info" style="font-weight:600; margin-bottom:12px;"></div>

        <label class="form-label">Excuse Type</label>
        <div style="display:flex; gap:12px; margin-bottom:16px; flex-wrap:wrap;">
          <label style="cursor:pointer; display:flex; align-items:center; gap:6px;">
            <input type="radio" name="excuseType" value="" checked> <span>None</span>
          </label>
          <label style="cursor:pointer; display:flex; align-items:center; gap:6px;">
            <input type="radio" name="excuseType" value="PE">
            <span class="excuse-PE">PE</span> Parent Excuse
          </label>
          <label style="cursor:pointer; display:flex; align-items:center; gap:6px;">
            <input type="radio" name="excuseType" value="DE">
            <span class="excuse-DE">DE</span> Doctor Excuse
          </label>
        </div>

        <label class="form-label">Notes (optional)</label>
        <textarea id="excuse-notes" class="w3-input w3-border w3-margin-bottom" rows="3"
          placeholder="Parent called, doctor note received, etc."></textarea>

        <div class="w3-row">
          <div class="w3-col m6 w3-padding-small">
            <button class="w3-button btn-primary w3-block" onclick="saveExcuse()">
              <i class="fas fa-save"></i> Save Excuse
            </button>
          </div>
          <div class="w3-col m6 w3-padding-small">
            <button class="w3-button btn-ghost w3-block" onclick="closeExcuseModal()">Cancel</button>
          </div>
        </div>
      </div>
    </div>
  </div>

  <div id="toast-container" style="position:fixed;bottom:20px;right:20px;z-index:9999;"></div>

  <script src="https://code.jquery.com/jquery-3.7.0.min.js"></script>
  <script src="https://cdn.datatables.net/1.13.6/js/jquery.dataTables.min.js"></script>
  <script type="module">
    import { initAuth, getCurrentUser } from './js/auth.js';
    import { getAll, updateDoc }        from './js/db.js';
    import { initNav }                  from './js/nav.js';
    import { formatDate, exportCSV, showToast } from './js/utils.js';

    let currentUser = null;
    let allLogs     = [];   // classAttendanceLogs with code T/U/E
    let allLabLogs  = [];   // classAttendanceLogs with learningLab:true
    let filtered    = [];
    let attTable    = null;

    initAuth().then(user => {
      currentUser = user;
      initNav('daily-attendance');
      init();
    });

    async function init() {
      try {
        document.getElementById('loading-container').style.display = 'flex';
        const raw = await getAll('classAttendanceLogs');
        // T, U, E absences for the main view
        allLogs    = raw.filter(l => ['T','U','E'].includes(l.attendanceCode));
        // All learning lab entries (any code) for the lab overlay
        allLabLogs = raw.filter(l => l.learningLab === true);
        document.getElementById('loading-container').style.display = 'none';

        populateTeacherFilter();
        applyFilters();
        attachEvents();
      } catch(e) {
        console.error(e);
        showToast('Error loading attendance data', 'error');
        document.getElementById('loading-container').style.display = 'none';
      }
    }

    function populateTeacherFilter() {
      const teachers = [...new Set(
        [...allLogs, ...allLabLogs].map(l => l.teacherLastName).filter(Boolean)
      )].sort();
      const sel = document.getElementById('filter-teacher');
      teachers.forEach(t => {
        const o = document.createElement('option');
        o.value = t; o.textContent = t;
        sel.appendChild(o);
      });
    }

    function getDate(log) {
      return log.classDate || log.date || '';
    }

    function applyFilters() {
      const start      = document.getElementById('filter-start').value;
      const end        = document.getElementById('filter-end').value;
      const student    = document.getElementById('filter-student').value.toLowerCase();
      const teacher    = document.getElementById('filter-teacher').value;
      const code       = document.getElementById('filter-code').value;
      const includeLabs = document.getElementById('filter-include-labs').checked;

      // Standard T/U/E records (skip learning labs here to avoid duplicates)
      let base = allLogs.filter(l => {
        if (l.learningLab) return false; // lab entries handled separately
        const d = getDate(l);
        if (start && d < start) return false;
        if (end   && d > end)   return false;
        if (code  && l.attendanceCode !== code) return false;
        if (teacher && l.teacherLastName !== teacher) return false;
        if (student) {
          const name = (l.studentName || '').toLowerCase();
          const aNum = (l.chattStateANumber || '').toLowerCase();
          if (!name.includes(student) && !aNum.includes(student)) return false;
        }
        return true;
      });

      // Learning lab entries (when toggle is on)
      let labEntries = [];
      if (includeLabs) {
        // Require a date filter when labs are included to avoid thousands of records
        const effectiveStart = start || new Date().toISOString().split('T')[0];
        const effectiveEnd   = end   || new Date().toISOString().split('T')[0];
        if (!start) document.getElementById('filter-start').value = effectiveStart;
        if (!end)   document.getElementById('filter-end').value   = effectiveEnd;

        // Skip '?' entries that are just placeholders with no T/U/E — show ALL lab entries
        labEntries = allLabLogs.filter(l => {
          const d = getDate(l);
          if (d < effectiveStart || d > effectiveEnd) return false;
          if (teacher && l.teacherLastName !== teacher) return false;
          if (student) {
            const name = (l.studentName || '').toLowerCase();
            const aNum = (l.chattStateANumber || '').toLowerCase();
            if (!name.includes(student) && !aNum.includes(student)) return false;
          }
          // If code filter is active, only show lab entries with that code (or all labs if no code filter)
          if (code && l.attendanceCode !== code && l.attendanceCode !== '?') return false;
          return true;
        });
      }

      filtered = [...base, ...labEntries]
        .sort((a, b) => getDate(b).localeCompare(getDate(a)));

      // Show/hide labs stat card
      document.getElementById('stat-lab-card').style.display = includeLabs ? '' : 'none';

      updateStats(labEntries);
      renderTable();
    }

    function updateStats(labEntries = []) {
      document.getElementById('stat-total').textContent     = filtered.length;
      document.getElementById('stat-unexcused').textContent = filtered.filter(l => l.attendanceCode === 'U').length;
      document.getElementById('stat-tardy').textContent     = filtered.filter(l => l.attendanceCode === 'T').length;
      // Excused = code E, or any record with PE/DE excuse
      document.getElementById('stat-excused').textContent   = filtered.filter(l =>
        l.attendanceCode === 'E' || l.excuseType === 'PE' || l.excuseType === 'DE'
      ).length;
      document.getElementById('stat-lab').textContent = labEntries.length;
    }

    function codeBadge(code, isLab) {
      if (isLab) {
        const map = { U: 'code-U', T: 'code-T', E: 'code-E', P: '', '?': 'code-Lab' };
        const label = code === '?' ? '⭐ Pending' : `⭐ Lab/${code}`;
        return `<span class="code-badge ${map[code] || 'code-Lab'}">${label}</span>`;
      }
      const map = { U: 'code-U', T: 'code-T', E: 'code-E' };
      return `<span class="code-badge ${map[code] || ''}">${code}</span>`;
    }

    function excuseBadge(log) {
      if (log.excuseType === 'PE') return `<span class="excuse-PE">PE</span>`;
      if (log.excuseType === 'DE') return `<span class="excuse-DE">DE</span>`;
      return '—';
    }

    function renderTable() {
      if (attTable) { attTable.destroy(); attTable = null; }
      const tbody = document.getElementById('attendance-tbody');
      tbody.innerHTML = '';

      filtered.forEach(log => {
        const d = getDate(log);
        const isLab = log.learningLab === true;
        const row = document.createElement('tr');
        // Row highlight
        if (isLab) {
          row.className = 'lab-row';
        } else if (log.attendanceCode === 'U' && !log.excuseType) {
          row.style.background = '#fff5f5';
        }
        // For lab entries still pending (?) the Excuse button is less relevant
        const excuseBtn = (isLab && log.attendanceCode === '?')
          ? `<a class="w3-button w3-small w3-purple action-button" href="class-attendance.html" title="Take attendance in Class Attendance">
               <i class="fas fa-flask"></i> Take Att.
             </a>`
          : `<button class="w3-button w3-small w3-blue action-button" onclick="openExcuseModal('${log.id}')">
               <i class="fas fa-file-medical"></i> Excuse
             </button>`;
        row.innerHTML = `
          <td>${formatDate(d)}</td>
          <td style="font-weight:600;">${log.studentName || '—'}${isLab ? ' <span class="lab-badge"><i class="fas fa-flask"></i> Lab</span>' : ''}</td>
          <td>${log.chattStateANumber || '—'}</td>
          <td>${codeBadge(log.attendanceCode, isLab)}</td>
          <td>${log.className || '—'}</td>
          <td>${log.teacherLastName || '—'}</td>
          <td id="excuse-cell-${log.id}">${excuseBadge(log)}</td>
          <td style="font-size:12px;color:#64748b;">${log.comment || log.excuseNotes || '—'}</td>
          <td>${excuseBtn}</td>
        `;
        tbody.appendChild(row);
      });

      attTable = $('#attendanceTable').DataTable({
        paging: true,
        pageLength: 50,
        ordering: true,
        searching: true,
        destroy: true,
        columnDefs: [{ orderable: false, targets: [8] }]
      });
    }

    function attachEvents() {
      document.getElementById('btn-apply').addEventListener('click', applyFilters);
      document.getElementById('filter-include-labs').addEventListener('change', applyFilters);
      document.getElementById('btn-clear').addEventListener('click', () => {
        document.getElementById('filter-start').value        = '';
        document.getElementById('filter-end').value          = '';
        document.getElementById('filter-student').value      = '';
        document.getElementById('filter-teacher').value      = '';
        document.getElementById('filter-code').value         = '';
        document.getElementById('filter-include-labs').checked = false;
        applyFilters();
      });
      document.getElementById('btn-download-csv').addEventListener('click', downloadCSV);
    }

    // ── Excuse Modal ─────────────────────────────────────────────────────────

    window.openExcuseModal = function(logId) {
      const log = allLogs.find(l => l.id === logId);
      if (!log) return;
      document.getElementById('excuse-log-id').value = logId;
      document.getElementById('excuse-student-info').textContent =
        `${log.studentName || ''}  ·  ${formatDate(getDate(log))}  ·  ${log.className || ''}  [${log.attendanceCode}]`;
      // Set radio
      document.querySelectorAll('input[name="excuseType"]').forEach(r => {
        r.checked = (r.value === (log.excuseType || ''));
      });
      document.getElementById('excuse-notes').value = log.excuseNotes || '';
      document.getElementById('excuseModal').style.display = 'block';
    };

    window.closeExcuseModal = function() {
      document.getElementById('excuseModal').style.display = 'none';
    };

    window.saveExcuse = async function() {
      const logId     = document.getElementById('excuse-log-id').value;
      const excuseType = document.querySelector('input[name="excuseType"]:checked')?.value || '';
      const excuseNotes = document.getElementById('excuse-notes').value.trim();

      try {
        await updateDoc('classAttendanceLogs', logId, { excuseType, excuseNotes });

        // Update local cache
        const log = allLogs.find(l => l.id === logId);
        if (log) { log.excuseType = excuseType; log.excuseNotes = excuseNotes; }

        // Update cell without full re-render
        const cell = document.getElementById(`excuse-cell-${logId}`);
        if (cell) cell.innerHTML = excuseBadge(log);

        updateStats();
        showToast(excuseType ? `Excuse (${excuseType}) saved` : 'Excuse removed', 'success');
        closeExcuseModal();
      } catch(e) {
        console.error(e);
        showToast('Error saving excuse', 'error');
      }
    };

    // ── CSV Download ─────────────────────────────────────────────────────────

    function downloadCSV() {
      if (filtered.length === 0) { showToast('No records to download', 'warning'); return; }
      const data = filtered.map(l => ({
        'Date':        formatDate(getDate(l)),
        'Student':     l.studentName || '',
        'A#':          l.chattStateANumber || '',
        'Code':        l.attendanceCode,
        'Type':        l.learningLab ? 'Learning Lab' : 'Regular',
        'Class':       l.className || '',
        'Teacher':     l.teacherLastName || '',
        'Excuse':      l.excuseType || '',
        'Excuse Notes': l.excuseNotes || '',
        'Comment':     l.comment || ''
      }));
      exportCSV(data, 'daily-attendance.csv');
    }
  </script>
</body>
</html>
