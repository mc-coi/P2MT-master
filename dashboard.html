<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <script src="./js/theme-init.js"></script>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dashboard - P2MT</title>
  <link rel="stylesheet" href="https://www.w3schools.com/w3css/4/w3.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link rel="stylesheet" href="css/main.css">
  <style>
    /* ── Weather card ── */
    .weather-card {
      background: linear-gradient(135deg, #1e3a5f 0%, #2563eb 100%);
      color: white; border-radius: 12px; padding: 22px 24px;
      min-height: 260px; display: flex; flex-direction: column; justify-content: space-between;
    }
    .weather-card.cls-clear  { background: linear-gradient(135deg, #d97706 0%, #f59e0b 100%); }
    .weather-card.cls-cloudy { background: linear-gradient(135deg, #374151 0%, #6b7280 100%); }
    .weather-card.cls-rainy  { background: linear-gradient(135deg, #1e40af 0%, #3b82f6 100%); }
    .weather-card.cls-snowy  { background: linear-gradient(135deg, #0369a1 0%, #93c5fd 100%); }
    .weather-card.cls-stormy { background: linear-gradient(135deg, #1f2937 0%, #7c3aed 100%); }

    .wx-location { font-size: 12px; opacity: .80; margin-bottom: 10px; letter-spacing: .02em; }
    .wx-main     { display: flex; justify-content: space-between; align-items: flex-start; }
    .wx-left {}
    .wx-desc     { font-size: 17px; font-weight: 600; margin-bottom: 4px; }
    .wx-temp     { font-size: 68px; font-weight: 200; line-height: 1; }
    .wx-temp sup { font-size: 22px; font-weight: 400; vertical-align: top; margin-top: 12px; display: inline-block; }
    .wx-feels    { font-size: 12px; opacity: .78; margin-top: 2px; }
    .wx-icon     { font-size: 56px; opacity: .90; padding-top: 4px; }

    .wx-details  { display: flex; gap: 18px; margin-top: 10px; padding-top: 10px; border-top: 1px solid rgba(255,255,255,.2); flex-wrap: wrap; }
    .wx-detail   { font-size: 12px; opacity: .85; }
    .wx-detail i { margin-right: 4px; }

    .wx-forecast { display: flex; margin-top: 12px; padding-top: 12px; border-top: 1px solid rgba(255,255,255,.2); }
    .wx-fc-day   { flex: 1; text-align: center; }
    .wx-fc-day:not(:last-child) { border-right: 1px solid rgba(255,255,255,.15); }
    .wx-fc-name  { font-size: 10px; opacity: .72; text-transform: uppercase; letter-spacing: .05em; }
    .wx-fc-icon  { font-size: 14px; margin: 3px 0; }
    .wx-fc-temps { font-size: 11px; }
    .wx-fc-hi    { font-weight: 700; }
    .wx-fc-lo    { opacity: .60; }

    .wx-loading  { flex: 1; display: flex; align-items: center; justify-content: center; flex-direction: column; gap: 8px; opacity: .7; }
    .wx-error    { flex: 1; display: flex; align-items: center; justify-content: center; flex-direction: column; gap: 6px; opacity: .75; font-size: 13px; }

    /* ── To-Do widget ── */
    .todo-input-row { display: flex; gap: 8px; margin-bottom: 14px; }
    .todo-input {
      flex: 1; border: 1.5px solid #e2e8f0; border-radius: 8px;
      padding: 8px 12px; font-size: 14px; color: var(--text-primary);
      outline: none; transition: border-color .15s;
    }
    .todo-input:focus { border-color: var(--primary); }
    .todo-add-btn {
      padding: 8px 16px; border-radius: 8px; border: none;
      background: var(--primary); color: white; font-size: 13px;
      font-weight: 600; cursor: pointer; white-space: nowrap;
      transition: opacity .15s;
    }
    .todo-add-btn:hover { opacity: .85; }
    .todo-list { list-style: none; margin: 0; padding: 0; }
    .todo-item {
      display: flex; align-items: center; gap: 10px;
      padding: 9px 4px; border-bottom: 1px solid #f1f5f9;
      transition: opacity .3s, transform .3s;
    }
    .todo-item:last-child { border-bottom: none; }
    .todo-item.done { opacity: 0; transform: translateX(20px); pointer-events: none; }
    .todo-cb {
      width: 18px; height: 18px; cursor: pointer; flex-shrink: 0;
      accent-color: var(--primary);
    }
    .todo-text { font-size: 14px; color: var(--text-primary); flex: 1; }
    .todo-empty { text-align: center; padding: 28px 0; color: var(--text-muted); font-size: 13px; }
    .todo-empty i { font-size: 28px; display: block; margin-bottom: 8px; opacity: .4; }
    /* ── Card for weather slot ── */
    #weatherSection { border-radius: 12px; overflow: hidden; }

    /* ── Quick-access shortcuts ── */
    .quick-access {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 16px;
      margin-bottom: 24px;
    }
    @media (max-width: 640px) { .quick-access { grid-template-columns: 1fr; } }

    .quick-btn {
      display: flex; flex-direction: column; align-items: flex-start;
      padding: 26px 24px 22px; border-radius: 14px;
      text-decoration: none; color: white;
      transition: transform .15s, box-shadow .15s;
      position: relative; overflow: hidden; cursor: pointer;
    }
    .quick-btn::after {
      content: ''; position: absolute; inset: 0;
      background: rgba(255,255,255,0); transition: background .15s;
    }
    .quick-btn:hover { transform: translateY(-3px); box-shadow: 0 10px 28px rgba(0,0,0,.20); }
    .quick-btn:hover::after { background: rgba(255,255,255,.06); }
    .quick-btn:active { transform: translateY(-1px); }

    .quick-btn.class-att  { background: linear-gradient(135deg, #4f46e5 0%, #7c3aed 100%); }
    .quick-btn.learn-lab  { background: linear-gradient(135deg, #0891b2 0%, #0369a1 100%); }
    .quick-btn.tmi-review { background: linear-gradient(135deg, #d97706 0%, #dc2626 100%); }

    .qb-icon  { font-size: 36px; margin-bottom: 16px; opacity: .92; }
    .qb-label { font-size: 19px; font-weight: 800; margin-bottom: 5px; line-height: 1.2; }
    .qb-desc  { font-size: 13px; opacity: .78; line-height: 1.4; }
    .qb-arrow {
      position: absolute; bottom: 20px; right: 22px;
      font-size: 15px; opacity: .55;
      transition: opacity .15s, right .15s;
    }
    .quick-btn:hover .qb-arrow { opacity: .9; right: 18px; }

    /* ── Attendance Alerts ── */
    .alert-row {
      display: flex; align-items: center; gap: 12px;
      padding: 12px 16px; border-bottom: 1px solid var(--border);
      text-decoration: none; transition: background .12s;
    }
    .alert-row:last-child { border-bottom: none; }
    .alert-row:hover { background: var(--surface-2); text-decoration: none; }
    .alert-dot {
      width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0;
    }
    .alert-dot.critical { background: #EF4444; box-shadow: 0 0 0 3px rgba(239,68,68,.2); }
    .alert-dot.warning  { background: #F59E0B; box-shadow: 0 0 0 3px rgba(245,158,11,.2); }
    .alert-name  { font-weight: 600; font-size: 13px; color: var(--text-primary); flex: 1; }
    .alert-badge {
      font-size: 11px; font-weight: 700; padding: 2px 9px;
      border-radius: 999px; white-space: nowrap;
    }
    .alert-badge.critical { background: #FEE2E2; color: #991B1B; }
    .alert-badge.warning  { background: #FEF3C7; color: #92400E; }
    [data-theme="dark"] .alert-badge.critical { background: rgba(239,68,68,.2); color: #FCA5A5; }
    [data-theme="dark"] .alert-badge.warning  { background: rgba(245,158,11,.2); color: #FDE68A; }
    .alert-date  { font-size: 11px; color: var(--text-muted); white-space: nowrap; }
    .alerts-empty { text-align: center; padding: 28px 16px; color: var(--text-muted); font-size: 13px; }
    .alerts-empty i { font-size: 28px; display: block; margin-bottom: 8px; opacity: .35; color: #10B981; }

    @media (max-width: 640px) {
      .quick-access { grid-template-columns: 1fr 1fr; gap: 10px; }
      .quick-btn { padding: 18px 16px 44px; border-radius: 12px; }
      .qb-icon  { font-size: 26px; margin-bottom: 10px; }
      .qb-label { font-size: 15px; }
      .qb-desc  { font-size: 12px; }
      .qb-arrow { bottom: 14px; right: 14px; }

      .weather-card { min-height: 200px; padding: 16px; }
      .wx-temp { font-size: 52px; }
      .wx-icon { font-size: 40px; }

      .alert-row { padding: 10px 12px; gap: 8px; }
      .alert-name { font-size: 12px; }
    }
  </style>
</head>
<body>
  <div id="nav-container"></div>
  <div class="page-container">

    <div class="page-header">
      <h1>Dashboard</h1>
      <div class="actions">
        <span id="current-date" style="font-size:14px;color:#666;"></span>
      </div>
    </div>

    <!-- Weather + To-Do row -->
    <div class="grid-2" style="align-items:stretch; margin-bottom:24px;">

      <!-- Weather -->
      <div class="weather-card" id="weatherCard">
        <div class="wx-loading">
          <i class="fas fa-spinner fa-spin" style="font-size:22px;"></i>
          <div style="font-size:13px;">Loading weather…</div>
        </div>
      </div>

      <!-- To-Do List -->
      <div class="card" style="margin:0;">
        <div class="card-header">
          <div class="card-title">
            <i class="fas fa-check-square" style="margin-right:6px;color:#4f46e5;"></i>To Do
          </div>
        </div>
        <div class="card-body" style="padding-top:10px;">
          <div class="todo-input-row">
            <input type="text" id="todo-input" class="todo-input" placeholder="Add a task…" maxlength="200">
            <button class="todo-add-btn" onclick="todoAdd()">
              <i class="fas fa-plus"></i> Add
            </button>
          </div>
          <ul class="todo-list" id="todo-list"></ul>
          <div class="todo-empty" id="todo-empty" style="display:none;">
            <i class="fas fa-clipboard-check"></i>
            All done — nothing left to do!
          </div>
        </div>
      </div>
    </div>

    <!-- Attendance Alerts -->
    <div class="card w3-margin-bottom">
      <div class="card-header">
        <div class="card-title">
          <i class="fas fa-exclamation-triangle" style="margin-right:6px;color:#EF4444;"></i>Attendance Alerts
        </div>
        <span id="alert-count-badge" style="display:none;" class="badge badge-danger"></span>
      </div>
      <div id="alerts-body" style="padding:0;">
        <div class="loading-container" style="padding:28px;"><div class="spinner"></div></div>
      </div>
    </div>

    <!-- Quick-access shortcuts -->
    <div class="quick-access">
      <a href="class-attendance.html" class="quick-btn class-att">
        <div class="qb-icon"><i class="fas fa-calendar-check"></i></div>
        <div class="qb-label">Class Attendance</div>
        <div class="qb-desc">Log &amp; review student attendance by class</div>
        <i class="fas fa-arrow-right qb-arrow"></i>
      </a>
      <a href="learning-lab.html" class="quick-btn learn-lab">
        <div class="qb-icon"><i class="fas fa-flask"></i></div>
        <div class="qb-label">Learning Lab</div>
        <div class="qb-desc">Track student learning lab sessions</div>
        <i class="fas fa-arrow-right qb-arrow"></i>
      </a>
      <a href="tmi-review.html" class="quick-btn tmi-review">
        <div class="qb-icon"><i class="fas fa-exclamation-triangle"></i></div>
        <div class="qb-label">TMI Review</div>
        <div class="qb-desc">Review &amp; manage intervention records</div>
        <i class="fas fa-arrow-right qb-arrow"></i>
      </a>
    </div>

  </div>

  <script type="module">
    import { initAuth, getCurrentUser } from './js/auth.js';
    import { initNav } from './js/nav.js';
    import { getAll } from './js/db.js';

    await initAuth();
    if (!getCurrentUser()) { window.location.href = 'index.html'; }
    initNav('home');

    // ── Date display ──
    const today = new Date();
    document.getElementById('current-date').textContent =
      today.toLocaleDateString('en-US', { weekday:'long', year:'numeric', month:'long', day:'numeric' });

    // ══════════════════════════════════════
    //  WEATHER — Open-Meteo (no API key)
    // ══════════════════════════════════════
    const WX_URL = 'https://api.open-meteo.com/v1/forecast'
      + '?latitude=35.0456&longitude=-85.2672'
      + '&current=temperature_2m,apparent_temperature,weathercode,windspeed_10m,relativehumidity_2m'
      + '&daily=temperature_2m_max,temperature_2m_min,weathercode,precipitation_probability_max'
      + '&temperature_unit=fahrenheit&windspeed_unit=mph&timezone=America%2FNew_York&forecast_days=5';

    const WMO = {
      0:  { i:'fa-sun',                d:'Clear sky',          c:'cls-clear'  },
      1:  { i:'fa-cloud-sun',          d:'Mainly clear',       c:'cls-clear'  },
      2:  { i:'fa-cloud-sun',          d:'Partly cloudy',      c:'cls-cloudy' },
      3:  { i:'fa-cloud',              d:'Overcast',           c:'cls-cloudy' },
      45: { i:'fa-smog',               d:'Foggy',              c:'cls-cloudy' },
      48: { i:'fa-smog',               d:'Rime fog',           c:'cls-cloudy' },
      51: { i:'fa-cloud-drizzle',      d:'Light drizzle',      c:'cls-rainy'  },
      53: { i:'fa-cloud-drizzle',      d:'Drizzle',            c:'cls-rainy'  },
      55: { i:'fa-cloud-drizzle',      d:'Heavy drizzle',      c:'cls-rainy'  },
      61: { i:'fa-cloud-rain',         d:'Light rain',         c:'cls-rainy'  },
      63: { i:'fa-cloud-rain',         d:'Moderate rain',      c:'cls-rainy'  },
      65: { i:'fa-cloud-showers-heavy',d:'Heavy rain',         c:'cls-rainy'  },
      71: { i:'fa-snowflake',          d:'Light snow',         c:'cls-snowy'  },
      73: { i:'fa-snowflake',          d:'Moderate snow',      c:'cls-snowy'  },
      75: { i:'fa-snowflake',          d:'Heavy snow',         c:'cls-snowy'  },
      80: { i:'fa-cloud-showers-heavy',d:'Rain showers',       c:'cls-rainy'  },
      81: { i:'fa-cloud-showers-heavy',d:'Heavy showers',      c:'cls-rainy'  },
      82: { i:'fa-cloud-showers-heavy',d:'Violent showers',    c:'cls-rainy'  },
      85: { i:'fa-snowflake',          d:'Snow showers',       c:'cls-snowy'  },
      86: { i:'fa-snowflake',          d:'Heavy snow showers', c:'cls-snowy'  },
      95: { i:'fa-bolt',               d:'Thunderstorm',       c:'cls-stormy' },
      96: { i:'fa-bolt',               d:'Thunderstorm + hail',c:'cls-stormy' },
      99: { i:'fa-bolt',               d:'Thunderstorm',       c:'cls-stormy' },
    };
    const DS = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
    function wmo(code) { return WMO[code] || { i:'fa-cloud', d:'Unknown', c:'' }; }

    try {
      const wx   = await (await fetch(WX_URL)).json();
      const cur  = wx.current;
      const day  = wx.daily;
      const w    = wmo(cur.weathercode);
      const card = document.getElementById('weatherCard');
      card.className = `weather-card ${w.c}`;

      let fcHtml = '';
      for (let i = 0; i < 5; i++) {
        const fw  = wmo(day.weathercode[i]);
        const lbl = i === 0 ? 'Today' : DS[new Date(day.time[i]+'T12:00:00').getDay()];
        fcHtml += `
          <div class="wx-fc-day">
            <div class="wx-fc-name">${lbl}</div>
            <div class="wx-fc-icon"><i class="fas ${fw.i}"></i></div>
            <div class="wx-fc-temps">
              <span class="wx-fc-hi">${Math.round(day.temperature_2m_max[i])}°</span>
              <span class="wx-fc-lo">/${Math.round(day.temperature_2m_min[i])}°</span>
            </div>
          </div>`;
      }

      card.innerHTML = `
        <div>
          <div class="wx-location"><i class="fas fa-map-marker-alt"></i> Chattanooga, TN 37406</div>
          <div class="wx-main">
            <div class="wx-left">
              <div class="wx-desc">${w.d}</div>
              <div class="wx-temp">${Math.round(cur.temperature_2m)}<sup>°F</sup></div>
              <div class="wx-feels">Feels like ${Math.round(cur.apparent_temperature)}°F</div>
            </div>
            <div class="wx-icon"><i class="fas ${w.i}"></i></div>
          </div>
          <div class="wx-details">
            <div class="wx-detail"><i class="fas fa-wind"></i>${Math.round(cur.windspeed_10m)} mph</div>
            <div class="wx-detail"><i class="fas fa-tint"></i>${cur.relativehumidity_2m}% humidity</div>
            <div class="wx-detail"><i class="fas fa-temperature-high"></i>H: ${Math.round(day.temperature_2m_max[0])}°F</div>
            <div class="wx-detail"><i class="fas fa-temperature-low"></i>L: ${Math.round(day.temperature_2m_min[0])}°F</div>
          </div>
        </div>
        <div class="wx-forecast">${fcHtml}</div>
      `;
    } catch(e) {
      console.error('Weather error:', e);
      document.getElementById('weatherCard').innerHTML =
        `<div class="wx-error"><i class="fas fa-cloud-slash" style="font-size:30px;"></i><div>Weather unavailable</div></div>`;
    }

    // ══════════════════════════════════════
    //  TO-DO LIST
    // ══════════════════════════════════════
    const TODO_KEY = 'p2mt_todo_items';

    function todoLoad() {
      try { return JSON.parse(localStorage.getItem(TODO_KEY)) || []; }
      catch(e) { return []; }
    }

    function todoSave(items) {
      localStorage.setItem(TODO_KEY, JSON.stringify(items));
    }

    function todoRender() {
      const items = todoLoad();
      const list  = document.getElementById('todo-list');
      const empty = document.getElementById('todo-empty');
      list.innerHTML = '';

      if (items.length === 0) {
        empty.style.display = 'block';
        return;
      }
      empty.style.display = 'none';

      items.forEach((text, idx) => {
        const li = document.createElement('li');
        li.className = 'todo-item';
        li.innerHTML = `
          <input type="checkbox" class="todo-cb" id="todo-cb-${idx}">
          <label class="todo-text" for="todo-cb-${idx}">${text.replace(/</g,'&lt;')}</label>`;

        li.querySelector('.todo-cb').addEventListener('change', () => {
          li.classList.add('done');
          // Wait for fade-out transition then remove from storage
          setTimeout(() => {
            const current = todoLoad();
            current.splice(idx, 1);
            todoSave(current);
            todoRender();
          }, 320);
        });

        list.appendChild(li);
      });
    }

    window.todoAdd = function() {
      const input = document.getElementById('todo-input');
      const text  = input.value.trim();
      if (!text) return;
      const items = todoLoad();
      items.push(text);
      todoSave(items);
      input.value = '';
      todoRender();
      input.focus();
    };

    // Add on Enter key
    document.getElementById('todo-input').addEventListener('keydown', e => {
      if (e.key === 'Enter') window.todoAdd();
    });

    // Initial render
    todoRender();

    // ══════════════════════════════════════
    //  ATTENDANCE ALERTS
    //  Thresholds (rolling 4 weeks across all classes):
    //    critical  — ≥ 3 unexcused absences
    //    warning   — ≥ 5 tardies
    //  Students can appear once; if both thresholds are hit the
    //  badge shows both counts and severity is critical.
    // ══════════════════════════════════════
    (async function loadAlerts() {
      const body = document.getElementById('alerts-body');
      try {
        const [students, logs] = await Promise.all([
          getAll('students'),
          getAll('classAttendanceLogs')   // one record per student per class per day
        ]);

        // Index students by Firestore id and by A-number for fast lookup
        const studentById   = {};
        const studentByANum = {};
        students.forEach(s => {
          studentById[s.id] = s;
          if (s.chattStateANumber) studentByANum[s.chattStateANumber] = s;
        });

        // Rolling 4-week cutoff
        const cutoff = new Date();
        cutoff.setDate(cutoff.getDate() - 28);
        const cutoffStr = cutoff.toISOString().slice(0, 10); // YYYY-MM-DD for string compare

        // Bucket recent logs by student (prefer studentId, fall back to A-number)
        const recentByStudent = {}; // { studentId: [log, ...] }
        logs.forEach(l => {
          const logDate = l.date || l.absenceDate || '';
          if (!logDate || logDate < cutoffStr) return;          // outside window
          const code = l.attendanceCode || l.status || '';
          if (code !== 'U' && code !== 'T') return;            // only flag U and T

          let sid = l.studentId;
          if (!sid && l.chattStateANumber) {
            const s = studentByANum[l.chattStateANumber];
            sid = s?.id;
          }
          if (!sid || !studentById[sid]) return;

          (recentByStudent[sid] = recentByStudent[sid] || []).push(l);
        });

        const alerts = [];

        for (const [sid, sLogs] of Object.entries(recentByStudent)) {
          const s      = studentById[sid];
          const uCount = sLogs.filter(l => (l.attendanceCode || l.status) === 'U').length;
          const tCount = sLogs.filter(l => (l.attendanceCode || l.status) === 'T').length;

          const hitU = uCount >= 3;
          const hitT = tCount >= 5;
          if (!hitU && !hitT) continue;

          // Most recent flagged log date for the "Last:" display
          const latestDate = sLogs
            .map(l => l.date || l.absenceDate || '')
            .sort()
            .at(-1) || '';

          // Build label — show whichever thresholds are hit
          const parts = [];
          if (hitU) parts.push(`${uCount} unexcused`);
          if (hitT) parts.push(`${tCount} tardies`);

          alerts.push({
            severity:  hitU ? 'critical' : 'warning',
            studentId: sid,
            name:      `${s.lastName}, ${s.firstName}`,
            label:     parts.join(' · ') + ' (4 wks)',
            date:      latestDate
          });
        }

        // Sort: critical first, then alpha by name
        alerts.sort((a, b) => {
          if (a.severity !== b.severity) return a.severity === 'critical' ? -1 : 1;
          return a.name.localeCompare(b.name);
        });

        if (alerts.length === 0) {
          body.innerHTML = `<div class="alerts-empty">
            <i class="fas fa-check-circle"></i>
            No attendance concerns right now — all clear!
          </div>`;
          return;
        }

        const badge = document.getElementById('alert-count-badge');
        badge.textContent = alerts.length;
        badge.style.display = 'inline-flex';

        body.innerHTML = alerts.map(a => {
          const dateStr = a.date ? new Date(a.date + 'T12:00:00').toLocaleDateString('en-US', { month:'short', day:'numeric' }) : '';
          return `<a href="student-profile.html?id=${a.studentId}" class="alert-row">
            <span class="alert-dot ${a.severity}"></span>
            <span class="alert-name">${a.name}</span>
            <span class="alert-badge ${a.severity}">${a.label}</span>
            ${dateStr ? `<span class="alert-date">Last: ${dateStr}</span>` : ''}
            <i class="fas fa-chevron-right" style="font-size:11px;color:var(--text-muted);"></i>
          </a>`;
        }).join('');

      } catch(e) {
        console.error('Alert load error:', e);
        body.innerHTML = `<div class="alerts-empty"><i class="fas fa-exclamation-circle"></i>Could not load alerts</div>`;
      }
    })();

  </script>
</body>
</html>
