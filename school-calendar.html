<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <script src="./js/theme-init.js"></script>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>School Calendar - P2MT</title>
  <link rel="stylesheet" href="https://www.w3schools.com/w3css/4/w3.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link rel="stylesheet" href="https://cdn.datatables.net/1.13.6/css/jquery.dataTables.min.css">
  <link rel="stylesheet" href="./css/main.css">
</head>
<body>
  <div id="nav-container"></div>
  <div class="page-container" style="margin-top:10px;">
    <div class="filter-bar">
      <h2>School Calendar</h2>
      <div class="w3-row">
        <div class="w3-col m12" style="display:flex;flex-wrap:wrap;gap:4px;padding:4px 0;">
          <button class="w3-button btn-primary w3-margin" id="btn-save-changes">
            <i class="fas fa-save"></i> Save Changes
          </button>
          <button class="w3-button btn-primary w3-margin" id="btn-add-date-range">
            <i class="fas fa-plus"></i> Add Date Range
          </button>
          <button class="w3-button w3-orange w3-margin" id="btn-clear-all">
            <i class="fas fa-eraser"></i> Clear All Checks
          </button>
          <button class="w3-button w3-red w3-margin" id="btn-reset-dates">
            <i class="fas fa-trash-alt"></i> Reset All Dates
          </button>
        </div>
      </div>
    </div>

    <div class="filter-bar">
      <h4>Filter by Date Range</h4>
      <div class="w3-row w3-margin-bottom">
        <div class="w3-col m3 w3-padding-small">
          <label>Start Month/Year</label>
          <select id="filter-start-month" class="w3-select w3-border">
            <option value="">Select...</option>
          </select>
        </div>
        <div class="w3-col m3 w3-padding-small">
          <label>End Month/Year</label>
          <select id="filter-end-month" class="w3-select w3-border">
            <option value="">Select...</option>
          </select>
        </div>
        <div class="w3-col m3 w3-padding-small">
          <label>&nbsp;</label>
          <button class="w3-button btn-primary w3-block" id="btn-load-filter">Load</button>
        </div>
      </div>
    </div>

    <div class="filter-bar">
      <div class="table-wrap">
      <table id="calendar-table" class="w3-table w3-striped w3-bordered">
          <thead>
            <tr class="w3-teal">
              <th>Date</th>
              <th>Day</th>
              <th>STEM</th>
              <th>Phase II</th>
              <th>ChattState</th>
              <th>Sr ER</th>
              <th>Sr Up</th>
              <th>Jr ER</th>
              <th>Jr Up</th>
              <th>Start TMI</th>
              <th>TMI Day</th>
            </tr>
          </thead>
          <tbody id="calendar-tbody">
          </tbody>
        </table>
      </div>
    </div>
  </div>

  <!-- Add Date Range Modal -->
  <div id="modal-add-dates" class="w3-modal">
    <div class="w3-modal-content w3-card w3-padding" style="max-width:460px;">
      <span class="w3-closebtn" onclick="document.getElementById('modal-add-dates').style.display='none'">&times;</span>
      <h3>Add Dates to Calendar</h3>

      <!-- Quick school-year shortcut -->
      <div style="background:#f0f4ff;border-radius:8px;padding:12px;margin-bottom:16px;">
        <label style="font-weight:600;font-size:0.9rem;">Quick Fill — School Year</label>
        <div style="display:flex;gap:8px;align-items:center;margin-top:8px;">
          <select id="quick-year-select" class="w3-select w3-border" style="max-width:170px;">
            <option value="">Select year…</option>
            <option value="2024">2024–2025</option>
            <option value="2025">2025–2026</option>
            <option value="2026">2026–2027</option>
            <option value="2027">2027–2028</option>
            <option value="2028">2028–2029</option>
          </select>
          <button type="button" class="w3-button btn-primary w3-small" onclick="fillSchoolYear()">Fill Dates</button>
        </div>
        <div style="font-size:11px;color:#888;margin-top:5px;">Fills Aug 1 → May 31 for that school year (adjust below if needed)</div>
      </div>

      <div class="w3-margin-bottom">
        <label>Start Date</label>
        <input type="date" id="input-start-date" class="w3-input w3-border w3-margin-bottom">
        <label>End Date</label>
        <input type="date" id="input-end-date" class="w3-input w3-border w3-margin-bottom">
        <button class="w3-button btn-primary w3-margin-top" id="btn-confirm-add-dates">Add Dates</button>
        <button class="w3-button btn-danger w3-margin-top" onclick="document.getElementById('modal-add-dates').style.display='none'">Cancel</button>
      </div>
    </div>
  </div>

  <!-- Confirm Action Modal -->
  <div id="modal-confirm-action" class="w3-modal">
    <div class="w3-modal-content w3-card w3-padding" style="max-width:440px;">
      <h3 id="confirm-modal-title" style="margin-top:0;"></h3>
      <p id="confirm-modal-body" style="color:#555;"></p>
      <div id="confirm-delete-section" style="display:none;margin-bottom:12px;">
        <label style="font-weight:600;font-size:0.9rem;">Type <strong>DELETE</strong> to confirm:</label>
        <input type="text" id="confirm-delete-input" class="w3-input w3-border w3-margin-top" placeholder="Type DELETE…">
      </div>
      <div style="display:flex;gap:8px;justify-content:flex-end;">
        <button id="confirm-modal-ok" class="w3-button w3-red">Confirm</button>
        <button class="w3-button w3-light-gray" onclick="closeConfirmModal()">Cancel</button>
      </div>
    </div>
  </div>

  <div id="toast-container" style="position:fixed;bottom:20px;right:20px;z-index:9999;"></div>

  <script src="https://code.jquery.com/jquery-3.7.0.min.js"></script>
  <script src="https://cdn.datatables.net/1.13.6/js/jquery.dataTables.min.js"></script>
  <script type="module">
    import { initAuth } from './js/auth.js';
    import { initNav } from './js/nav.js';
    import { getAll, addDoc, updateDoc, deleteDoc, getWhere } from './js/db.js';
    import { showToast } from './js/utils.js';

    let calendarData = [];
    let changedRows = new Set();
    let pendingConfirmAction = null; // 'clear' | 'reset'

    initAuth().then(user => {
      initNav('school-calendar');
      init();
    });

    async function init() {
      await loadCalendarData();
      populateMonthSelects();
      setupEventListeners();
    }

    async function loadCalendarData() {
      try {
        calendarData = await getAll('schoolCalendar');
        calendarData.sort((a, b) => new Date(a.classDate) - new Date(b.classDate));
        renderCalendarTable(calendarData);
      } catch (error) {
        console.error('Error loading calendar:', error);
        showToast('Error loading calendar data', 'error');
      }
    }

    function renderCalendarTable(data) {
      const tbody = document.getElementById('calendar-tbody');
      tbody.innerHTML = '';

      data.forEach(row => {
        const date = new Date(row.classDate);
        const dayOfWeek = date.toLocaleDateString('en-US', { weekday: 'long' });
        const isWeekend = date.getDay() === 0 || date.getDay() === 6;

        const tr = document.createElement('tr');
        tr.id = `row-${row.id}`;
        tr.className = getRowClass(row);
        if (isWeekend) tr.classList.add('w3-light-gray');

        tr.innerHTML = `
          <td>${row.classDate}</td>
          <td>${dayOfWeek}</td>
          <td>${getCheckboxCell('stemSchoolDay', row)}</td>
          <td>${getCheckboxCell('phaseIISchoolDay', row)}</td>
          <td>${getCheckboxCell('chattStateSchoolDay', row)}</td>
          <td>${getCheckboxCell('seniorErDay', row)}</td>
          <td>${getCheckboxCell('seniorUpDay', row)}</td>
          <td>${getCheckboxCell('juniorErDay', row)}</td>
          <td>${getCheckboxCell('juniorUpDay', row)}</td>
          <td>${getCheckboxCell('startTmiPeriod', row)}</td>
          <td>${getCheckboxCell('tmiDay', row)}</td>
        `;

        if (!isWeekend) {
          tr.querySelectorAll('input[type="checkbox"]').forEach(input => {
            input.addEventListener('change', (e) => {
              changedRows.add(row.id);
              tr.classList.add('w3-pale-yellow');
            });
          });
        }

        tbody.appendChild(tr);
      });
    }

    function getCheckboxCell(field, row) {
      const isWeekend = new Date(row.classDate).getDay() === 0 || new Date(row.classDate).getDay() === 6;
      return `<input type="checkbox" class="w3-check" ${row[field] ? 'checked' : ''} data-field="${field}" data-id="${row.id}" ${isWeekend ? 'disabled' : ''}>`;
    }

    function getRowClass(row) {
      if (row.tmiDay) return 'w3-pale-yellow';
      if (row.seniorErDay || row.juniorErDay) return 'w3-pale-blue';
      return '';
    }

    function populateMonthSelects() {
      if (calendarData.length === 0) return;

      const months = new Set();
      calendarData.forEach(row => {
        const date = new Date(row.classDate);
        const monthYear = date.toLocaleDateString('en-US', { year: 'numeric', month: 'long' });
        months.add(monthYear);
      });

      const sortedMonths = Array.from(months).sort((a, b) => new Date(a) - new Date(b));
      const startSelect = document.getElementById('filter-start-month');
      const endSelect = document.getElementById('filter-end-month');

      sortedMonths.forEach(month => {
        const option1 = document.createElement('option');
        option1.value = month;
        option1.textContent = month;
        startSelect.appendChild(option1);

        const option2 = document.createElement('option');
        option2.value = month;
        option2.textContent = month;
        endSelect.appendChild(option2);
      });
    }

    function setupEventListeners() {
      document.getElementById('btn-save-changes').addEventListener('click', saveChanges);
      document.getElementById('btn-add-date-range').addEventListener('click', () => {
        document.getElementById('modal-add-dates').style.display = 'block';
      });
      document.getElementById('btn-confirm-add-dates').addEventListener('click', addDateRange);
      document.getElementById('btn-load-filter').addEventListener('click', filterByDateRange);

      document.getElementById('btn-clear-all').addEventListener('click', () => {
        if (calendarData.length === 0) { showToast('No calendar data loaded', 'info'); return; }
        pendingConfirmAction = 'clear';
        document.getElementById('confirm-modal-title').textContent = 'Clear All Checks';
        document.getElementById('confirm-modal-body').textContent =
          `This will uncheck every checkbox across all ${calendarData.length} calendar dates and save to the database. The dates themselves will be kept. This cannot be undone.`;
        document.getElementById('confirm-delete-section').style.display = 'none';
        document.getElementById('confirm-modal-ok').textContent = 'Clear All';
        document.getElementById('confirm-modal-ok').className = 'w3-button w3-orange';
        document.getElementById('modal-confirm-action').style.display = 'block';
      });

      document.getElementById('btn-reset-dates').addEventListener('click', () => {
        if (calendarData.length === 0) { showToast('No calendar data loaded', 'info'); return; }
        pendingConfirmAction = 'reset';
        document.getElementById('confirm-modal-title').textContent = 'Reset All Dates';
        document.getElementById('confirm-modal-body').textContent =
          `This will permanently delete all ${calendarData.length} dates from the calendar. This cannot be undone.`;
        document.getElementById('confirm-delete-section').style.display = 'block';
        document.getElementById('confirm-delete-input').value = '';
        document.getElementById('confirm-modal-ok').textContent = 'Delete All Dates';
        document.getElementById('confirm-modal-ok').className = 'w3-button w3-red';
        document.getElementById('modal-confirm-action').style.display = 'block';
      });

      document.getElementById('confirm-modal-ok').addEventListener('click', handleConfirmOk);

      document.querySelectorAll('.w3-closebtn').forEach(btn => {
        btn.addEventListener('click', (e) => {
          e.target.closest('.w3-modal').style.display = 'none';
        });
      });
    }

    window.closeConfirmModal = function() {
      document.getElementById('modal-confirm-action').style.display = 'none';
      pendingConfirmAction = null;
    };

    async function handleConfirmOk() {
      if (pendingConfirmAction === 'clear') {
        await clearAllChecks();
      } else if (pendingConfirmAction === 'reset') {
        const typed = document.getElementById('confirm-delete-input').value.trim();
        if (typed !== 'DELETE') {
          showToast('Please type DELETE to confirm', 'warning');
          return;
        }
        await resetAllDates();
      }
      closeConfirmModal();
    }

    // Uncheck every boolean field on every calendar row and save to Firestore
    async function clearAllChecks() {
      const BOOL_FIELDS = [
        'stemSchoolDay','phaseIISchoolDay','chattStateSchoolDay',
        'seniorErDay','seniorUpDay','juniorErDay','juniorUpDay',
        'startTmiPeriod','tmiDay'
      ];
      const cleared = {};
      BOOL_FIELDS.forEach(f => cleared[f] = false);

      try {
        showToast('Clearing all checks…', 'info');
        await Promise.all(calendarData.map(row => updateDoc('schoolCalendar', row.id, cleared)));
        calendarData.forEach(row => Object.assign(row, cleared));
        changedRows.clear();
        renderCalendarTable(calendarData);
        showToast(`Cleared all checks on ${calendarData.length} dates`, 'success');
      } catch (err) {
        console.error('Error clearing checks:', err);
        showToast('Error clearing checks', 'error');
      }
    }

    // Delete every calendar entry from Firestore and clear local state
    async function resetAllDates() {
      try {
        const count = calendarData.length;
        showToast('Deleting all dates…', 'info');
        await Promise.all(calendarData.map(row => deleteDoc('schoolCalendar', row.id)));
        calendarData = [];
        changedRows.clear();
        renderCalendarTable([]);
        // Reset month filter selects
        ['filter-start-month','filter-end-month'].forEach(id => {
          const sel = document.getElementById(id);
          sel.innerHTML = '<option value="">Select...</option>';
        });
        showToast(`Deleted all ${count} calendar dates`, 'success');
      } catch (err) {
        console.error('Error resetting dates:', err);
        showToast('Error deleting dates', 'error');
      }
    }

    async function saveChanges() {
      if (changedRows.size === 0) {
        showToast('No changes to save', 'info');
        return;
      }

      try {
        for (const rowId of changedRows) {
          const row = calendarData.find(r => r.id === rowId);
          if (!row) continue;

          const tr = document.getElementById(`row-${rowId}`);
          const updates = {};

          tr.querySelectorAll('input[type="checkbox"]').forEach(input => {
            updates[input.dataset.field] = input.checked;
          });

          await updateDoc('schoolCalendar', rowId, updates);
          Object.assign(row, updates);
        }

        changedRows.clear();
        renderCalendarTable(calendarData);
        showToast('Changes saved successfully', 'success');
      } catch (error) {
        console.error('Error saving changes:', error);
        showToast('Error saving changes', 'error');
      }
    }

    async function addDateRange() {
      const startDate = document.getElementById('input-start-date').value;
      const endDate = document.getElementById('input-end-date').value;

      if (!startDate || !endDate) {
        showToast('Please select both start and end dates', 'error');
        return;
      }

      const start = new Date(startDate);
      const end = new Date(endDate);

      if (start > end) {
        showToast('Start date must be before end date', 'error');
        return;
      }

      try {
        const current = new Date(start);
        const newDates = [];

        while (current <= end) {
          if (current.getDay() !== 0 && current.getDay() !== 6) {
            const dateStr = current.toISOString().split('T')[0];
            const exists = calendarData.some(d => d.classDate === dateStr);

            if (!exists) {
              const dayOfWeek = current.toLocaleDateString('en-US', { weekday: 'long' });
              const newDoc = {
                classDate: dateStr,
                day: dayOfWeek,
                stemSchoolDay: false,
                phaseIISchoolDay: false,
                chattStateSchoolDay: false,
                seniorErDay: false,
                seniorUpDay: false,
                juniorErDay: false,
                juniorUpDay: false,
                startTmiPeriod: false,
                tmiDay: false
              };
              const docId = await addDoc('schoolCalendar', newDoc);
              newDates.push({ ...newDoc, id: docId });
            }
          }
          current.setDate(current.getDate() + 1);
        }

        calendarData = [...calendarData, ...newDates];
        calendarData.sort((a, b) => new Date(a.classDate) - new Date(b.classDate));
        renderCalendarTable(calendarData);
        populateMonthSelects();
        document.getElementById('modal-add-dates').style.display = 'none';
        document.getElementById('input-start-date').value = '';
        document.getElementById('input-end-date').value = '';
        showToast(`Added ${newDates.length} dates to calendar`, 'success');
      } catch (error) {
        console.error('Error adding dates:', error);
        showToast('Error adding dates', 'error');
      }
    }

    function filterByDateRange() {
      const startMonth = document.getElementById('filter-start-month').value;
      const endMonth = document.getElementById('filter-end-month').value;

      if (!startMonth || !endMonth) {
        showToast('Please select both start and end months', 'error');
        return;
      }

      const startDate = new Date(startMonth);
      const endDate = new Date(endMonth);
      endDate.setMonth(endDate.getMonth() + 1);
      endDate.setDate(0);

      const filtered = calendarData.filter(row => {
        const date = new Date(row.classDate);
        return date >= startDate && date <= endDate;
      });

      renderCalendarTable(filtered);
      changedRows.clear();
    }

    window.addEventListener('click', (event) => {
      const addModal     = document.getElementById('modal-add-dates');
      const confirmModal = document.getElementById('modal-confirm-action');
      if (event.target === addModal)     addModal.style.display     = 'none';
      if (event.target === confirmModal) closeConfirmModal();
    });

    // Fill start/end dates from a school year quick-select (Aug 1 → May 31)
    window.fillSchoolYear = function() {
      const yr = document.getElementById('quick-year-select').value;
      if (!yr) { showToast('Please select a year first', 'warning'); return; }
      const y = parseInt(yr, 10);
      document.getElementById('input-start-date').value = `${y}-08-01`;
      document.getElementById('input-end-date').value   = `${y + 1}-05-31`;
      showToast(`Dates set to Aug 1, ${y} → May 31, ${y + 1}`, 'info');
    };
  </script>
</body>
</html>
