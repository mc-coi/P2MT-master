<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>School Calendar - P2MT</title>
  <link rel="stylesheet" href="https://www.w3schools.com/w3css/4/w3.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link rel="stylesheet" href="https://cdn.datatables.net/1.13.6/css/jquery.dataTables.min.css">
  <link rel="stylesheet" href="./css/main.css">
</head>
<body>
  <div id="nav-container"></div>
  <div class="page-container" style="margin-top:10px;">
    <div class="filter-bar">
      <h2>School Calendar</h2>
      <div class="w3-row">
        <div class="w3-col m6">
          <button class="w3-button btn-primary w3-margin" id="btn-save-changes">
            <i class="fas fa-save"></i> Save Changes
          </button>
          <button class="w3-button btn-primary w3-margin" id="btn-add-date-range">
            <i class="fas fa-plus"></i> Add Date Range
          </button>
        </div>
      </div>
    </div>

    <div class="filter-bar">
      <h4>Filter by Date Range</h4>
      <div class="w3-row w3-margin-bottom">
        <div class="w3-col m3 w3-padding-small">
          <label>Start Month/Year</label>
          <select id="filter-start-month" class="w3-select w3-border">
            <option value="">Select...</option>
          </select>
        </div>
        <div class="w3-col m3 w3-padding-small">
          <label>End Month/Year</label>
          <select id="filter-end-month" class="w3-select w3-border">
            <option value="">Select...</option>
          </select>
        </div>
        <div class="w3-col m3 w3-padding-small">
          <label>&nbsp;</label>
          <button class="w3-button btn-primary w3-block" id="btn-load-filter">Load</button>
        </div>
      </div>
    </div>

    <div class="filter-bar">
      <div class="table-wrap">
      <table id="calendar-table" class="w3-table w3-striped w3-bordered">
          <thead>
            <tr class="w3-teal">
              <th>Date</th>
              <th>Day</th>
              <th>STEM</th>
              <th>Phase II</th>
              <th>ChattState</th>
              <th>Sr ER</th>
              <th>Sr Up</th>
              <th>Jr ER</th>
              <th>Jr Up</th>
              <th>Start TMI</th>
              <th>TMI Day</th>
              <th>Day #</th>
            </tr>
          </thead>
          <tbody id="calendar-tbody">
          </tbody>
        </table>
      </div>
    </div>
  </div>

  <!-- Add Date Range Modal -->
  <div id="modal-add-dates" class="w3-modal">
    <div class="w3-modal-content w3-card w3-padding">
      <span class="w3-closebtn" onclick="document.getElementById('modal-add-dates').style.display='none'">&times;</span>
      <h3>Add Date Range to Calendar</h3>
      <div class="w3-margin-bottom">
        <label>Start Date</label>
        <input type="date" id="input-start-date" class="w3-input w3-border w3-margin-bottom">
        <label>End Date</label>
        <input type="date" id="input-end-date" class="w3-input w3-border w3-margin-bottom">
        <button class="w3-button btn-primary w3-margin-top" id="btn-confirm-add-dates">Add Dates</button>
        <button class="w3-button btn-danger w3-margin-top" onclick="document.getElementById('modal-add-dates').style.display='none'">Cancel</button>
      </div>
    </div>
  </div>

  <div id="toast-container" style="position:fixed;bottom:20px;right:20px;z-index:9999;"></div>

  <script src="https://code.jquery.com/jquery-3.7.0.min.js"></script>
  <script src="https://cdn.datatables.net/1.13.6/js/jquery.dataTables.min.js"></script>
  <script type="module">
    import { initAuth } from './js/auth.js';
    import { initNav } from './js/nav.js';
    import { getAll, addDoc, updateDoc, getWhere } from './js/db.js';
    import { showToast } from './js/utils.js';

    let calendarData = [];
    let changedRows = new Set();

    initAuth().then(user => {
      initNav('school-calendar');
      init();
    });

    async function init() {
      await loadCalendarData();
      populateMonthSelects();
      setupEventListeners();
    }

    async function loadCalendarData() {
      try {
        calendarData = await getAll('schoolCalendar');
        calendarData.sort((a, b) => new Date(a.classDate) - new Date(b.classDate));
        renderCalendarTable(calendarData);
      } catch (error) {
        console.error('Error loading calendar:', error);
        showToast('Error loading calendar data', 'error');
      }
    }

    function renderCalendarTable(data) {
      const tbody = document.getElementById('calendar-tbody');
      tbody.innerHTML = '';

      data.forEach(row => {
        const date = new Date(row.classDate);
        const dayOfWeek = date.toLocaleDateString('en-US', { weekday: 'long' });
        const isWeekend = date.getDay() === 0 || date.getDay() === 6;

        const tr = document.createElement('tr');
        tr.id = `row-${row.id}`;
        tr.className = getRowClass(row);
        if (isWeekend) tr.classList.add('w3-light-gray');

        tr.innerHTML = `
          <td>${row.classDate}</td>
          <td>${dayOfWeek}</td>
          <td>${getCheckboxCell('stemSchoolDay', row)}</td>
          <td>${getCheckboxCell('phaseIISchoolDay', row)}</td>
          <td>${getCheckboxCell('chattStateSchoolDay', row)}</td>
          <td>${getCheckboxCell('seniorErDay', row)}</td>
          <td>${getCheckboxCell('seniorUpDay', row)}</td>
          <td>${getCheckboxCell('juniorErDay', row)}</td>
          <td>${getCheckboxCell('juniorUpDay', row)}</td>
          <td>${getCheckboxCell('startTmiPeriod', row)}</td>
          <td>${getCheckboxCell('tmiDay', row)}</td>
          <td><input type="number" class="w3-input w3-small" value="${row.dayNumber || ''}" data-field="dayNumber" data-id="${row.id}" ${isWeekend ? 'disabled' : ''}></td>
        `;

        if (!isWeekend) {
          tr.querySelectorAll('input[type="checkbox"], input[type="number"]').forEach(input => {
            input.addEventListener('change', (e) => {
              changedRows.add(row.id);
              tr.classList.add('w3-pale-yellow');
            });
          });
        }

        tbody.appendChild(tr);
      });
    }

    function getCheckboxCell(field, row) {
      const isWeekend = new Date(row.classDate).getDay() === 0 || new Date(row.classDate).getDay() === 6;
      return `<input type="checkbox" class="w3-check" ${row[field] ? 'checked' : ''} data-field="${field}" data-id="${row.id}" ${isWeekend ? 'disabled' : ''}>`;
    }

    function getRowClass(row) {
      if (row.tmiDay) return 'w3-pale-yellow';
      if (row.seniorErDay || row.juniorErDay) return 'w3-pale-blue';
      return '';
    }

    function populateMonthSelects() {
      if (calendarData.length === 0) return;

      const months = new Set();
      calendarData.forEach(row => {
        const date = new Date(row.classDate);
        const monthYear = date.toLocaleDateString('en-US', { year: 'numeric', month: 'long' });
        months.add(monthYear);
      });

      const sortedMonths = Array.from(months).sort((a, b) => new Date(a) - new Date(b));
      const startSelect = document.getElementById('filter-start-month');
      const endSelect = document.getElementById('filter-end-month');

      sortedMonths.forEach(month => {
        const option1 = document.createElement('option');
        option1.value = month;
        option1.textContent = month;
        startSelect.appendChild(option1);

        const option2 = document.createElement('option');
        option2.value = month;
        option2.textContent = month;
        endSelect.appendChild(option2);
      });
    }

    function setupEventListeners() {
      document.getElementById('btn-save-changes').addEventListener('click', saveChanges);
      document.getElementById('btn-add-date-range').addEventListener('click', () => {
        document.getElementById('modal-add-dates').style.display = 'block';
      });
      document.getElementById('btn-confirm-add-dates').addEventListener('click', addDateRange);
      document.getElementById('btn-load-filter').addEventListener('click', filterByDateRange);

      document.querySelectorAll('.w3-closebtn').forEach(btn => {
        btn.addEventListener('click', (e) => {
          e.target.closest('.w3-modal').style.display = 'none';
        });
      });
    }

    async function saveChanges() {
      if (changedRows.size === 0) {
        showToast('No changes to save', 'info');
        return;
      }

      try {
        for (const rowId of changedRows) {
          const row = calendarData.find(r => r.id === rowId);
          if (!row) continue;

          const tr = document.getElementById(`row-${rowId}`);
          const updates = {};

          tr.querySelectorAll('input[type="checkbox"]').forEach(input => {
            updates[input.dataset.field] = input.checked;
          });

          tr.querySelectorAll('input[type="number"]').forEach(input => {
            updates[input.dataset.field] = parseInt(input.value) || null;
          });

          await updateDoc('schoolCalendar', rowId, updates);
          Object.assign(row, updates);
        }

        changedRows.clear();
        renderCalendarTable(calendarData);
        showToast('Changes saved successfully', 'success');
      } catch (error) {
        console.error('Error saving changes:', error);
        showToast('Error saving changes', 'error');
      }
    }

    async function addDateRange() {
      const startDate = document.getElementById('input-start-date').value;
      const endDate = document.getElementById('input-end-date').value;

      if (!startDate || !endDate) {
        showToast('Please select both start and end dates', 'error');
        return;
      }

      const start = new Date(startDate);
      const end = new Date(endDate);

      if (start > end) {
        showToast('Start date must be before end date', 'error');
        return;
      }

      try {
        const current = new Date(start);
        const newDates = [];

        while (current <= end) {
          if (current.getDay() !== 0 && current.getDay() !== 6) {
            const dateStr = current.toISOString().split('T')[0];
            const exists = calendarData.some(d => d.classDate === dateStr);

            if (!exists) {
              const dayOfWeek = current.toLocaleDateString('en-US', { weekday: 'long' });
              const newDoc = {
                classDate: dateStr,
                day: dayOfWeek,
                dayNumber: null,
                stemSchoolDay: false,
                phaseIISchoolDay: false,
                chattStateSchoolDay: false,
                seniorErDay: false,
                seniorUpDay: false,
                juniorErDay: false,
                juniorUpDay: false,
                startTmiPeriod: false,
                tmiDay: false
              };
              const docId = await addDoc('schoolCalendar', newDoc);
              newDates.push({ ...newDoc, id: docId });
            }
          }
          current.setDate(current.getDate() + 1);
        }

        calendarData = [...calendarData, ...newDates];
        calendarData.sort((a, b) => new Date(a.classDate) - new Date(b.classDate));
        renderCalendarTable(calendarData);
        populateMonthSelects();
        document.getElementById('modal-add-dates').style.display = 'none';
        document.getElementById('input-start-date').value = '';
        document.getElementById('input-end-date').value = '';
        showToast(`Added ${newDates.length} dates to calendar`, 'success');
      } catch (error) {
        console.error('Error adding dates:', error);
        showToast('Error adding dates', 'error');
      }
    }

    function filterByDateRange() {
      const startMonth = document.getElementById('filter-start-month').value;
      const endMonth = document.getElementById('filter-end-month').value;

      if (!startMonth || !endMonth) {
        showToast('Please select both start and end months', 'error');
        return;
      }

      const startDate = new Date(startMonth);
      const endDate = new Date(endMonth);
      endDate.setMonth(endDate.getMonth() + 1);
      endDate.setDate(0);

      const filtered = calendarData.filter(row => {
        const date = new Date(row.classDate);
        return date >= startDate && date <= endDate;
      });

      renderCalendarTable(filtered);
      changedRows.clear();
    }

    window.addEventListener('click', (event) => {
      const modal = document.getElementById('modal-add-dates');
      if (event.target === modal) {
        modal.style.display = 'none';
      }
    });
  </script>
</body>
</html>
