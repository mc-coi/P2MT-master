<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Students - P2MT</title>
  <link rel="stylesheet" href="https://www.w3schools.com/w3css/4/w3.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link rel="stylesheet" href="https://cdn.datatables.net/1.13.6/css/jquery.dataTables.min.css">
  <link rel="stylesheet" href="./css/main.css">
  <style>
    .student-badge { font-size: 0.85rem; padding: 4px 8px; }
    .action-button { margin: 2px; font-size: 0.9rem; }
    .modal-form { max-width: 600px; }
    .spinner { display: inline-block; margin-right: 8px; }

    /* Tab navigation */
    .tab-nav { border-bottom: 2px solid #e0e0e0; margin-bottom: 16px; display: flex; gap: 0; }
    .tab-btn { background: none; border: none; border-bottom: 3px solid transparent; padding: 10px 22px; cursor: pointer; font-size: 1rem; color: #666; margin-bottom: -2px; transition: color 0.15s, border-color 0.15s; }
    .tab-btn:hover { color: #333; }
    .tab-btn.active { color: #00796b; border-bottom-color: #00796b; font-weight: 600; }
    .tab-content { display: none; }
    .tab-content.active { display: block; }

    /* Interventions list */
    .int-student-row { display: flex; align-items: center; justify-content: space-between; padding: 10px 14px; border-bottom: 1px solid #eee; }
    .int-student-row:hover { background: #f9f9f9; }
    .int-student-name { font-weight: 500; }
    .int-student-meta { font-size: 0.82rem; color: #888; }
    .int-actions { display: flex; gap: 6px; }
    #interventionListWrap { border: 1px solid #ddd; border-radius: 6px; overflow: hidden; }
    .int-empty { padding: 24px; text-align: center; color: #aaa; }
    .int-badge { display: inline-block; background: #e8f5e9; color: #2e7d32; border-radius: 12px; padding: 1px 9px; font-size: 0.78rem; margin-left: 8px; font-weight: 600; }

    /* View modal table */
    .int-view-table { width: 100%; border-collapse: collapse; font-size: 0.9rem; }
    .int-view-table th { background: #00796b; color: #fff; padding: 8px 10px; text-align: left; }
    .int-view-table td { padding: 7px 10px; border-bottom: 1px solid #eee; }
    .int-view-table tr:last-child td { border-bottom: none; }
    .int-level-chip { display: inline-block; background: #fff3e0; color: #e65100; border-radius: 10px; padding: 1px 8px; font-size: 0.78rem; font-weight: 600; }
  </style>
</head>
<body>
  <div id="nav-container"></div>
  
  <div class="page-container">
    <!-- Header -->
    <div class="page-header">
      <h1><i class="fas fa-users"></i> Students 
        <span class="badge badge-primary" id="student-count">0</span>
      </h1>
      <div class="actions">
        <button id="btn-add-student" class="w3-button btn-primary action-button">
          <i class="fas fa-plus"></i> Add Student
        </button>
        <button id="btn-download-csv" class="w3-button btn-primary action-button">
          <i class="fas fa-download"></i> Download CSV
        </button>
        <button id="btn-upload-csv" class="w3-button btn-primary action-button">
          <i class="fas fa-upload"></i> Upload CSV
        </button>
        <input type="file" id="file-upload" style="display:none;" accept=".csv">
      </div>
    </div>

    <!-- Tab Navigation -->
    <div class="tab-nav">
      <button class="tab-btn active" id="tab-btn-students" onclick="switchTab('students')">
        <i class="fas fa-users"></i> Students
      </button>
      <button class="tab-btn" id="tab-btn-interventions" onclick="switchTab('interventions')">
        <i class="fas fa-clipboard-list"></i> Interventions
      </button>
    </div>

    <!-- ===== STUDENTS TAB ===== -->
    <div id="tab-students" class="tab-content active">

    <!-- Filter Bar -->
    <div class="filter-bar">
      <div class="w3-row">
        <div class="w3-col m4 w3-padding-small">
          <div class="filter-group">
            <label class="form-label">Search</label>
            <input type="text" id="search-input" class="w3-input w3-border" placeholder="Search name or email...">
          </div>
        </div>
        <div class="w3-col m4 w3-padding-small">
          <div class="filter-group">
            <label class="form-label">Graduation Year</label>
            <select id="grad-year-filter" class="w3-select w3-border">
              <option value="">All Graduation Years</option>
              <option value="2025">2025</option>
              <option value="2026">2026</option>
              <option value="2027">2027</option>
              <option value="2028">2028</option>
              <option value="2029">2029</option>
              <option value="2030">2030</option>
            </select>
          </div>
        </div>
        <div class="w3-col m4 w3-padding-small">
          <div class="filter-group">
            <label class="form-label">House</label>
            <select id="house-filter" class="w3-select w3-border">
              <option value="">All Houses</option>
              <option value="Mirzakhani">Mirzakhani</option>
              <option value="Einstein">Einstein</option>
              <option value="Tesla">Tesla</option>
              <option value="Staupers">Staupers</option>
            </select>
          </div>
        </div>
      </div>
    </div>

    <!-- DataTable -->
    <div class="table-wrap">
      <table id="studentsTable" class="w3-table w3-striped w3-bordered">
        <thead class="w3-teal">
          <tr>
            <th>Name</th>
            <th>Grad Year</th>
            <th>House</th>
            <th>Email</th>
            <th>ChattState A#</th>
            <th>Actions</th>
          </tr>
        </thead>
        <tbody id="students-tbody">
        </tbody>
      </table>
    </div>

    </div><!-- end #tab-students -->

    <!-- ===== INTERVENTIONS TAB ===== -->
    <div id="tab-interventions" class="tab-content">
      <div style="margin-bottom:14px;">
        <input type="text" id="int-search" class="w3-input w3-border" placeholder="Search student name..." style="max-width:360px;" oninput="renderInterventionList()">
      </div>
      <div id="interventionListWrap">
        <div class="int-empty" id="int-loading"><i class="fas fa-spinner fa-spin"></i> Loading…</div>
      </div>
    </div><!-- end #tab-interventions -->

  </div><!-- end .page-container -->

  <!-- Add/Edit Student Modal -->
  <div id="addEditModal" class="w3-modal">
    <div class="w3-modal-content w3-card modal-form">
      <header class="modal-header">
        <h3 id="modal-title">Add Student</h3>
        <button class="modal-close-btn" onclick="closeAddEditModal()">×</button>
      </header>
      <form id="studentForm" class="modal-body">
        <div class="form-group">
          <label class="form-label">First Name</label>
          <input type="text" id="firstName" class="w3-input w3-border w3-margin-bottom" required>
        </div>
        
        <div class="form-group">
          <label class="form-label">Last Name</label>
          <input type="text" id="lastName" class="w3-input w3-border w3-margin-bottom" required>
        </div>
        
        <div class="form-group">
          <label class="form-label">Email</label>
          <input type="email" id="email" class="w3-input w3-border w3-margin-bottom" required>
        </div>
        
        <div class="form-group">
          <label class="form-label">ChattState A#</label>
          <input type="text" id="chattStateANumber" class="w3-input w3-border w3-margin-bottom" required>
        </div>
        
        <div class="form-group">
          <label class="form-label">Year of Graduation</label>
          <select id="yearOfGraduation" class="w3-select w3-border w3-margin-bottom" required>
            <option value="">Select Year</option>
            <option value="2025">2025</option>
            <option value="2026">2026</option>
            <option value="2027">2027</option>
            <option value="2028">2028</option>
            <option value="2029">2029</option>
            <option value="2030">2030</option>
          </select>
        </div>
        
        <div class="form-group">
          <label class="form-label">House</label>
          <select id="house" class="w3-select w3-border w3-margin-bottom" required>
            <option value="">Select House</option>
            <option value="Mirzakhani">Mirzakhani</option>
            <option value="Einstein">Einstein</option>
            <option value="Tesla">Tesla</option>
            <option value="Staupers">Staupers</option>
          </select>
        </div>
        
        <div class="form-group">
          <label class="form-label">Google Calendar ID (Optional)</label>
          <input type="text" id="googleCalendarId" class="w3-input w3-border w3-margin-bottom">
        </div>
        
        <div class="modal-footer">
          <button type="submit" class="w3-button btn-primary">Save Student</button>
          <button type="button" class="w3-button btn-ghost" onclick="closeAddEditModal()">Cancel</button>
        </div>
      </form>
    </div>
  </div>

  <!-- Delete Confirmation Modal -->
  <div id="deleteConfirmModal" class="w3-modal">
    <div class="w3-modal-content w3-card" style="max-width: 400px;">
      <header class="modal-header">
        <h3>Delete Student</h3>
        <button class="modal-close-btn" onclick="closeDeleteModal()">×</button>
      </header>
      <div class="modal-body">
        <p>Type <b>DELETE</b> to confirm deletion of <span id="delete-student-name"></span></p>
        <input type="text" id="delete-confirm-input" class="w3-input w3-border w3-margin-bottom" placeholder="Type DELETE...">
      </div>
      <div class="modal-footer">
        <button class="w3-button btn-danger" onclick="confirmDelete()">Delete</button>
        <button class="w3-button btn-ghost" onclick="closeDeleteModal()">Cancel</button>
      </div>
    </div>
  </div>

  <!-- Add Attendance Modal -->
  <div id="attendanceModal" class="w3-modal">
    <div class="w3-modal-content w3-card" style="max-width: 400px;">
      <header class="modal-header">
        <h3>Add Daily Attendance</h3>
        <button class="modal-close-btn" onclick="closeAttendanceModal()">×</button>
      </header>
      <form id="attendanceForm" class="modal-body">
        <div class="form-group">
          <label class="form-label">Student</label>
          <p id="attendance-student-name" class="w3-margin-bottom"></p>
        </div>
        
        <div class="form-group">
          <label class="form-label">Date</label>
          <input type="date" id="attendance-date" class="w3-input w3-border w3-margin-bottom" required>
        </div>
        
        <div class="form-group">
          <label class="form-label">Attendance Code</label>
          <select id="attendance-code" class="w3-select w3-border w3-margin-bottom" required>
            <option value="">Select Code</option>
            <option value="Present">Present</option>
            <option value="Absent">Absent</option>
            <option value="Tardy">Tardy</option>
            <option value="Excused">Excused</option>
          </select>
        </div>
        
        <div class="form-group">
          <label class="form-label">Comment (Optional)</label>
          <textarea id="attendance-comment" class="w3-input w3-border w3-margin-bottom" rows="3"></textarea>
        </div>
        
        <div class="modal-footer">
          <button type="submit" class="w3-button btn-primary">Save Attendance</button>
          <button type="button" class="w3-button btn-ghost" onclick="closeAttendanceModal()">Cancel</button>
        </div>
      </form>
    </div>
  </div>

  <!-- ===== ASSIGN INTERVENTION MODAL ===== -->
  <div id="assignInterventionModal" class="w3-modal">
    <div class="w3-modal-content w3-card modal-form" style="max-width:520px;">
      <header class="modal-header">
        <h3><i class="fas fa-clipboard-list"></i> Assign Intervention</h3>
        <button class="modal-close-btn" onclick="closeAssignModal()">×</button>
      </header>
      <form id="assignInterventionForm" class="modal-body" onsubmit="saveIntervention(event)">
        <div class="form-group" style="margin-bottom:6px;">
          <label class="form-label" style="font-weight:600;font-size:1rem;" id="assign-student-name-label">Student</label>
        </div>

        <div class="form-group">
          <label class="form-label">Category</label>
          <select id="int-category" class="w3-select w3-border w3-margin-bottom" required onchange="updateLevelOptions()">
            <option value="">Select Category</option>
            <option value="Attendance">Attendance</option>
            <option value="Bullying/Harassment">Bullying/Harassment</option>
            <option value="Conduct">Conduct</option>
            <option value="Academic">Academic</option>
            <option value="Dress Code">Dress Code</option>
          </select>
        </div>

        <div class="form-group">
          <label class="form-label">Level</label>
          <select id="int-level" class="w3-select w3-border w3-margin-bottom" required>
            <option value="">Select Category First</option>
          </select>
        </div>

        <div class="form-group">
          <label class="form-label">Date &amp; Time</label>
          <input type="datetime-local" id="int-datetime" class="w3-input w3-border w3-margin-bottom" required>
        </div>

        <div class="form-group">
          <label class="form-label">Comments</label>
          <textarea id="int-comments" class="w3-input w3-border w3-margin-bottom" rows="3" placeholder="Optional notes…"></textarea>
        </div>

        <div class="modal-footer">
          <button type="submit" class="w3-button btn-primary"><i class="fas fa-save"></i> Save</button>
          <button type="button" class="w3-button btn-ghost" onclick="closeAssignModal()">Cancel</button>
        </div>
      </form>
    </div>
  </div>

  <!-- ===== VIEW INTERVENTIONS MODAL ===== -->
  <div id="viewInterventionModal" class="w3-modal">
    <div class="w3-modal-content w3-card" style="max-width:720px;width:95%;">
      <header class="modal-header">
        <h3><i class="fas fa-history"></i> Intervention History — <span id="view-student-name-label"></span></h3>
        <button class="modal-close-btn" onclick="closeViewModal()">×</button>
      </header>
      <div class="modal-body" style="overflow-x:auto;padding-bottom:0;">
        <div id="int-view-content">
          <div class="int-empty"><i class="fas fa-spinner fa-spin"></i> Loading…</div>
        </div>
      </div>
      <div class="modal-footer">
        <button class="w3-button btn-ghost" onclick="closeViewModal()">Close</button>
      </div>
    </div>
  </div>

  <div id="toast-container" style="position:fixed;bottom:20px;right:20px;z-index:9999;"></div>

  <script src="https://code.jquery.com/jquery-3.7.0.min.js"></script>
  <script src="https://cdn.datatables.net/1.13.6/js/jquery.dataTables.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
  <script type="module">
    import { initAuth, getCurrentUser } from './js/auth.js';
    import { initNav } from './js/nav.js';
    import { getAll, getById, addDoc, updateDoc, deleteDoc } from './js/db.js';
    import { formatDate, exportCSV, showToast, showModal } from './js/utils.js';

    let studentsData = [];
    let dataTable;
    let currentEditId = null;
    let currentDeleteId = null;
    let currentAttendanceId = null;

    // Interventions state
    let interventionsData = [];        // all records from Firebase
    let assignStudentId = null;        // student being assigned
    let viewStudentId = null;          // student being viewed

    const INTERVENTION_LEVELS = {
      'Attendance':          3,
      'Bullying/Harassment': 3,
      'Conduct':             6,
      'Academic':            4,
      'Dress Code':          4
    };

    window.closeAddEditModal = closeAddEditModal;
    window.closeDeleteModal = closeDeleteModal;
    window.closeAttendanceModal = closeAttendanceModal;
    window.editStudent = editStudent;
    window.deleteStudent = deleteStudent;
    window.addAttendance = addAttendance;
    window.confirmDelete = confirmDelete;

    // Intervention globals
    window.switchTab = switchTab;
    window.renderInterventionList = renderInterventionList;
    window.openAssignModal = openAssignModal;
    window.closeAssignModal = closeAssignModal;
    window.saveIntervention = saveIntervention;
    window.openViewModal = openViewModal;
    window.closeViewModal = closeViewModal;
    window.updateLevelOptions = updateLevelOptions;

    initAuth().then(user => {
      if (!user) {
        window.location.href = 'index.html';
        return;
      }
      initNav('students');
      init();
    });

    async function init() {
      await loadStudents();
      setupEventListeners();
      renderTable();
      // Pre-load interventions in background
      loadInterventions().catch(() => {});
    }

    async function loadStudents() {
      try {
        showToast('Loading students...', 'info');
        studentsData = await getAll('students');
        document.getElementById('student-count').textContent = studentsData.length;
      } catch (error) {
        console.error('Error loading students:', error);
        showToast('Error loading students', 'error');
      }
    }

    function renderTable() {
      const tbody = document.getElementById('students-tbody');
      tbody.innerHTML = '';

      studentsData.forEach(student => {
        const row = tbody.insertRow();
        row.innerHTML = `
          <td>${student.lastName}, ${student.firstName}</td>
          <td>${student.yearOfGraduation}</td>
          <td>${student.house}</td>
          <td>${student.email}</td>
          <td>${student.chattStateANumber}</td>
          <td>
            <button class="w3-button w3-small btn-primary action-button" onclick="editStudent('${student.id}')">
              <i class="fas fa-edit"></i> Edit
            </button>
            <a href="./student-profile.html?id=${student.id}" class="w3-button w3-small btn-ghost action-button">
              <i class="fas fa-user"></i> Profile
            </a>
            <button class="w3-button w3-small btn-primary action-button" onclick="addAttendance('${student.id}')">
              <i class="fas fa-calendar-check"></i> Attendance
            </button>
            <button class="w3-button w3-small btn-danger action-button" onclick="deleteStudent('${student.id}')">
              <i class="fas fa-trash"></i> Delete
            </button>
          </td>
        `;
      });

      if (dataTable) {
        dataTable.destroy();
      }

      dataTable = $('#studentsTable').DataTable({
        paging: true,
        pageLength: 25,
        ordering: true,
        searching: false
      });

      applyFilters();
    }

    function setupEventListeners() {
      document.getElementById('btn-add-student').addEventListener('click', openAddModal);
      document.getElementById('btn-download-csv').addEventListener('click', downloadCSV);
      document.getElementById('btn-upload-csv').addEventListener('click', () => {
        document.getElementById('file-upload').click();
      });
      document.getElementById('file-upload').addEventListener('change', handleFileUpload);
      
      document.getElementById('studentForm').addEventListener('submit', handleStudentFormSubmit);
      document.getElementById('attendanceForm').addEventListener('submit', handleAttendanceFormSubmit);
      
      document.getElementById('search-input').addEventListener('keyup', applyFilters);
      document.getElementById('grad-year-filter').addEventListener('change', applyFilters);
      document.getElementById('house-filter').addEventListener('change', applyFilters);
    }

    function openAddModal() {
      currentEditId = null;
      document.getElementById('modal-title').textContent = 'Add Student';
      document.getElementById('studentForm').reset();
      document.getElementById('addEditModal').style.display = 'block';
    }

    function closeAddEditModal() {
      document.getElementById('addEditModal').style.display = 'none';
      currentEditId = null;
    }

    async function editStudent(id) {
      currentEditId = id;
      const student = studentsData.find(s => s.id === id);
      
      document.getElementById('modal-title').textContent = 'Edit Student';
      document.getElementById('firstName').value = student.firstName;
      document.getElementById('lastName').value = student.lastName;
      document.getElementById('email').value = student.email;
      document.getElementById('chattStateANumber').value = student.chattStateANumber;
      document.getElementById('yearOfGraduation').value = student.yearOfGraduation;
      document.getElementById('house').value = student.house;
      document.getElementById('googleCalendarId').value = student.googleCalendarId || '';
      
      document.getElementById('addEditModal').style.display = 'block';
    }

    async function handleStudentFormSubmit(e) {
      e.preventDefault();

      const studentData = {
        firstName: document.getElementById('firstName').value,
        lastName: document.getElementById('lastName').value,
        email: document.getElementById('email').value,
        chattStateANumber: document.getElementById('chattStateANumber').value,
        yearOfGraduation: document.getElementById('yearOfGraduation').value,
        house: document.getElementById('house').value,
        googleCalendarId: document.getElementById('googleCalendarId').value || null
      };

      try {
        if (currentEditId) {
          await updateDoc('students', currentEditId, studentData);
          showToast('Student updated successfully', 'success');
        } else {
          const docId = generateId();
          await addDoc('students', docId, studentData);
          showToast('Student added successfully', 'success');
        }
        closeAddEditModal();
        await loadStudents();
        renderTable();
      } catch (error) {
        console.error('Error saving student:', error);
        showToast('Error saving student', 'error');
      }
    }

    function deleteStudent(id) {
      currentDeleteId = id;
      const student = studentsData.find(s => s.id === id);
      document.getElementById('delete-student-name').textContent = `${student.firstName} ${student.lastName}`;
      document.getElementById('delete-confirm-input').value = '';
      document.getElementById('deleteConfirmModal').style.display = 'block';
    }

    function closeDeleteModal() {
      document.getElementById('deleteConfirmModal').style.display = 'none';
      currentDeleteId = null;
    }

    async function confirmDelete() {
      const input = document.getElementById('delete-confirm-input').value;
      if (input !== 'DELETE') {
        showToast('Please type DELETE to confirm', 'warning');
        return;
      }

      try {
        await deleteDoc('students', currentDeleteId);
        showToast('Student deleted successfully', 'success');
        closeDeleteModal();
        await loadStudents();
        renderTable();
      } catch (error) {
        console.error('Error deleting student:', error);
        showToast('Error deleting student', 'error');
      }
    }

    function addAttendance(id) {
      currentAttendanceId = id;
      const student = studentsData.find(s => s.id === id);
      document.getElementById('attendance-student-name').textContent = `${student.firstName} ${student.lastName}`;
      
      const today = new Date().toISOString().split('T')[0];
      document.getElementById('attendance-date').value = today;
      
      document.getElementById('attendanceModal').style.display = 'block';
    }

    function closeAttendanceModal() {
      document.getElementById('attendanceModal').style.display = 'none';
      currentAttendanceId = null;
    }

    async function handleAttendanceFormSubmit(e) {
      e.preventDefault();

      const attendanceData = {
        studentId: currentAttendanceId,
        date: document.getElementById('attendance-date').value,
        code: document.getElementById('attendance-code').value,
        comment: document.getElementById('attendance-comment').value || ''
      };

      try {
        const docId = generateId();
        await addDoc('attendance', docId, attendanceData);
        showToast('Attendance recorded successfully', 'success');
        closeAttendanceModal();
        document.getElementById('attendanceForm').reset();
      } catch (error) {
        console.error('Error recording attendance:', error);
        showToast('Error recording attendance', 'error');
      }
    }

    function applyFilters() {
      const searchValue = document.getElementById('search-input').value.toLowerCase();
      const gradYearValue = document.getElementById('grad-year-filter').value;
      const houseValue = document.getElementById('house-filter').value;

      dataTable.rows().every(function() {
        const data = this.data();
        const fullName = `${data[0].toLowerCase()} ${data[3].toLowerCase()}`;
        const gradYear = data[1];
        const house = data[2];

        const searchMatch = fullName.includes(searchValue);
        const gradYearMatch = !gradYearValue || gradYear === gradYearValue;
        const houseMatch = !houseValue || house === houseValue;

        if (searchMatch && gradYearMatch && houseMatch) {
          $(this.node()).show();
        } else {
          $(this.node()).hide();
        }
      });
    }

    async function downloadCSV() {
      try {
        const csvData = studentsData.map(student => ({
          'First Name': student.firstName,
          'Last Name': student.lastName,
          'Email': student.email,
          'ChattState A#': student.chattStateANumber,
          'Graduation Year': student.yearOfGraduation,
          'House': student.house,
          'Google Calendar ID': student.googleCalendarId || ''
        }));
        exportCSV(csvData, 'students.csv');
        showToast('CSV downloaded successfully', 'success');
      } catch (error) {
        console.error('Error downloading CSV:', error);
        showToast('Error downloading CSV', 'error');
      }
    }

    async function handleFileUpload(e) {
      const file = e.target.files[0];
      if (!file) return;

      Papa.parse(file, {
        header: true,
        skipEmptyLines: true,
        complete: async (results) => {
          const rows = results.data.filter(row =>
            row['First_Name'] || row['First Name'] || row['firstName']
          );
          if (rows.length === 0) {
            showToast('No valid rows found in CSV', 'error');
            return;
          }

          showToast(`Uploading ${rows.length} students…`, 'info');
          let successful = 0, errors = 0;

          for (let i = 0; i < rows.length; i++) {
            try {
              const row = rows[i];
              await addDoc('students', {
                firstName:         row['First_Name']          || row['First Name']       || row['firstName']         || '',
                lastName:          row['Last_Name']           || row['Last Name']        || row['lastName']          || '',
                email:             row['Student_Email']       || row['Email']            || row['email']             || '',
                chattStateANumber: row['Chatt_State_A_Number']|| row['ChattState A#']    || row['chattStateANumber'] || '',
                yearOfGraduation:  row['Year_of_Graduation']  || row['Graduation Year']  || row['yearOfGraduation']  || '',
                house:             row['House']               || row['house']            || '',
                studentNumber:     row['Student_Number']      || row['Student Number']   || '',
                googleCalendarId:  row['googleCalendarID']    || row['Google Calendar ID']|| row['googleCalendarId'] || ''
              });
              successful++;
            } catch (err) {
              console.error('Row error:', err);
              errors++;
            }
          }

          if (errors === 0) {
            showToast(`${successful} students uploaded successfully`, 'success');
          } else {
            showToast(`Uploaded ${successful}, failed ${errors}`, 'warning');
          }
          document.getElementById('file-upload').value = '';
          await loadStudents();
          renderTable();
        },
        error: (error) => {
          console.error('CSV parsing error:', error);
          showToast('Error parsing CSV file', 'error');
        }
      });
    }

    // =====================================================
    // TAB SWITCHING
    // =====================================================
    function switchTab(tab) {
      ['students', 'interventions'].forEach(t => {
        document.getElementById('tab-' + t).classList.toggle('active', t === tab);
        document.getElementById('tab-btn-' + t).classList.toggle('active', t === tab);
      });
      if (tab === 'interventions') {
        renderInterventionList();
      }
    }

    // =====================================================
    // INTERVENTIONS — LOAD & RENDER LIST
    // =====================================================
    async function loadInterventions() {
      try {
        interventionsData = await getAll('studentInterventions');
      } catch (err) {
        console.error('Error loading interventions:', err);
        interventionsData = [];
      }
    }

    function renderInterventionList() {
      const search = (document.getElementById('int-search')?.value || '').toLowerCase();
      const wrap = document.getElementById('interventionListWrap');

      const filtered = studentsData.filter(s => {
        const name = `${s.firstName} ${s.lastName}`.toLowerCase();
        return !search || name.includes(search);
      }).sort((a, b) => a.lastName.localeCompare(b.lastName));

      if (filtered.length === 0) {
        wrap.innerHTML = '<div class="int-empty">No students found.</div>';
        return;
      }

      wrap.innerHTML = filtered.map(s => {
        const count = interventionsData.filter(r => r.studentId === s.id).length;
        const badge = count > 0 ? `<span class="int-badge">${count} record${count > 1 ? 's' : ''}</span>` : '';
        return `
          <div class="int-student-row">
            <div>
              <span class="int-student-name">${s.lastName}, ${s.firstName}</span>${badge}
              <div class="int-student-meta">${s.yearOfGraduation} · ${s.house || '—'}</div>
            </div>
            <div class="int-actions">
              <button class="w3-button w3-small btn-ghost action-button" onclick="openViewModal('${s.id}')">
                <i class="fas fa-eye"></i> View
              </button>
              <button class="w3-button w3-small btn-primary action-button" onclick="openAssignModal('${s.id}')">
                <i class="fas fa-plus"></i> Assign
              </button>
            </div>
          </div>`;
      }).join('');
    }

    // =====================================================
    // ASSIGN MODAL
    // =====================================================
    function openAssignModal(studentId) {
      assignStudentId = studentId;
      const s = studentsData.find(x => x.id === studentId);
      document.getElementById('assign-student-name-label').textContent = `${s.firstName} ${s.lastName}`;
      document.getElementById('assignInterventionForm').reset();
      document.getElementById('int-level').innerHTML = '<option value="">Select Category First</option>';

      // Default datetime to now (local)
      const now = new Date();
      const pad = n => String(n).padStart(2, '0');
      const local = `${now.getFullYear()}-${pad(now.getMonth()+1)}-${pad(now.getDate())}T${pad(now.getHours())}:${pad(now.getMinutes())}`;
      document.getElementById('int-datetime').value = local;

      document.getElementById('assignInterventionModal').style.display = 'block';
    }

    function closeAssignModal() {
      document.getElementById('assignInterventionModal').style.display = 'none';
      assignStudentId = null;
    }

    function updateLevelOptions() {
      const cat = document.getElementById('int-category').value;
      const maxLevel = INTERVENTION_LEVELS[cat] || 0;
      const sel = document.getElementById('int-level');
      if (!cat) {
        sel.innerHTML = '<option value="">Select Category First</option>';
        return;
      }
      sel.innerHTML = '<option value="">Select Level</option>' +
        Array.from({ length: maxLevel }, (_, i) =>
          `<option value="${i+1}">Level ${i+1}</option>`
        ).join('');
    }

    async function saveIntervention(e) {
      e.preventDefault();
      const s = studentsData.find(x => x.id === assignStudentId);
      const record = {
        studentId:    assignStudentId,
        studentName:  `${s.firstName} ${s.lastName}`,
        category:     document.getElementById('int-category').value,
        level:        parseInt(document.getElementById('int-level').value, 10),
        dateTime:     document.getElementById('int-datetime').value,
        comments:     document.getElementById('int-comments').value.trim(),
        createdAt:    new Date().toISOString()
      };

      try {
        await addDoc('studentInterventions', record);
        showToast('Intervention saved', 'success');
        closeAssignModal();
        await loadInterventions();
        renderInterventionList();
      } catch (err) {
        console.error('Error saving intervention:', err);
        showToast('Error saving intervention', 'error');
      }
    }

    // =====================================================
    // VIEW MODAL
    // =====================================================
    async function openViewModal(studentId) {
      viewStudentId = studentId;
      const s = studentsData.find(x => x.id === studentId);
      document.getElementById('view-student-name-label').textContent = `${s.firstName} ${s.lastName}`;
      document.getElementById('int-view-content').innerHTML = '<div class="int-empty"><i class="fas fa-spinner fa-spin"></i> Loading…</div>';
      document.getElementById('viewInterventionModal').style.display = 'block';

      // Ensure latest data
      await loadInterventions();
      const records = interventionsData
        .filter(r => r.studentId === studentId)
        .sort((a, b) => b.dateTime.localeCompare(a.dateTime));

      const content = document.getElementById('int-view-content');
      if (records.length === 0) {
        content.innerHTML = '<div class="int-empty">No interventions recorded for this student yet.</div>';
        return;
      }

      content.innerHTML = `
        <table class="int-view-table">
          <thead>
            <tr>
              <th>Date &amp; Time</th>
              <th>Category</th>
              <th>Level</th>
              <th>Comments</th>
            </tr>
          </thead>
          <tbody>
            ${records.map(r => {
              const dt = r.dateTime ? new Date(r.dateTime) : null;
              const dtStr = dt ? dt.toLocaleString('en-US', { month:'short', day:'numeric', year:'numeric', hour:'numeric', minute:'2-digit' }) : r.dateTime;
              return `<tr>
                <td style="white-space:nowrap;">${dtStr}</td>
                <td>${r.category}</td>
                <td><span class="int-level-chip">Level ${r.level}</span></td>
                <td>${r.comments || '<em style="color:#bbb;">—</em>'}</td>
              </tr>`;
            }).join('')}
          </tbody>
        </table>`;
    }

    function closeViewModal() {
      document.getElementById('viewInterventionModal').style.display = 'none';
      viewStudentId = null;
    }

    function generateId() {
      return Date.now().toString(36) + Math.random().toString(36).substr(2);
    }
  </script>
</body>
</html>
